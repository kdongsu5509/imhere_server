version: '3.8'

# Production compose — App(Spring) + Nginx(reverse proxy) + Grafana Alloy
# Observability: App → Alloy → Grafana Cloud (logs/metrics/traces 모두 Alloy 경유)
# Redis / RabbitMQ / MySQL: 별도 인프라 EC2 (이 compose에는 포함되지 않음)
#
# Required .env on EC2 (EC2_DEPLOY_PATH/.env):
#   # Image / infra 호스트
#   ECR_REGISTRY, ECR_REPOSITORY
#   INFRA_HOST, DB_HOST, DB_NAME
#   # 데이터스토어 자격증명
#   DB_USER, DB_PASSWORD
#   REDIS_PASSWORD
#   RABBITMQ_USER, RABBITMQ_PASSWORD
#   # Grafana Cloud (Alloy → Loki/Prometheus/Tempo)
#   GRAFANA_CLOUD_LOKI_ENDPOINT, GRAFANA_CLOUD_LOKI_USER, GRAFANA_CLOUD_LOKI_API_KEY
#   GRAFANA_CLOUD_PROM_ENDPOINT, GRAFANA_CLOUD_PROM_USER, GRAFANA_CLOUD_PROM_API_KEY
#   GRAFANA_CLOUD_TEMPO_ENDPOINT, GRAFANA_CLOUD_TEMPO_USER, GRAFANA_CLOUD_TEMPO_API_KEY

services:
  dsko:
    image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest
    container_name: iamhere-server-container
    # Nginx가 리버스 프록시 역할을 하므로 외부 8080 포트는 더 이상 직접 노출하지 않음
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:4861:4861"
    volumes:
      - ./config:/app/config:ro
      - ./secrets/imhereFirebaseKey.json:/app/secrets/imhereFirebaseKey.json:ro
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATA_REDIS_HOST=${INFRA_HOST}
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_RABBITMQ_HOST=${INFRA_HOST}
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_VIRTUAL_HOST=/main
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_USER}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?createDatabaseIfNotExist=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      # Firebase 키 경로 — ClassPathResource 대신 파일시스템 경로 사용
      - FIREBASE_PATH=file:/app/secrets/imhereFirebaseKey.json
      # OpenTelemetry → Alloy (OTLP HTTP). Alloy가 Tempo로 forward
      # Spring Boot 4 OTel starter는 management.otlp.tracing.* 프로퍼티를 사용
      - MANAGEMENT_OTLP_TRACING_ENDPOINT=http://alloy:4318/v1/traces
    networks:
      - app-network
    restart: unless-stopped

  # Nginx Reverse Proxy (HTTPS & CORS)
  nginx:
    image: nginx:alpine
    container_name: nginx-container
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro # 호스트의 Certbot 인증서 공유
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      - dsko

  # Grafana Alloy: 단일 수집 게이트웨이
  #   - logs:    Docker stdout → Loki
  #   - metrics: App management 포트 scrape → Prometheus
  #   - traces:  App OTLP(4317/4318) 수신 → Tempo
  alloy:
    image: grafana/alloy:latest
    container_name: alloy-container
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./alloy-config.alloy:/etc/alloy/config.alloy:ro
    environment:
      - GRAFANA_CLOUD_LOKI_ENDPOINT=${GRAFANA_CLOUD_LOKI_ENDPOINT}
      - GRAFANA_CLOUD_LOKI_USER=${GRAFANA_CLOUD_LOKI_USER}
      - GRAFANA_CLOUD_LOKI_API_KEY=${GRAFANA_CLOUD_LOKI_API_KEY}
      - GRAFANA_CLOUD_PROM_ENDPOINT=${GRAFANA_CLOUD_PROM_ENDPOINT}
      - GRAFANA_CLOUD_PROM_USER=${GRAFANA_CLOUD_PROM_USER}
      - GRAFANA_CLOUD_PROM_API_KEY=${GRAFANA_CLOUD_PROM_API_KEY}
      - GRAFANA_CLOUD_TEMPO_ENDPOINT=${GRAFANA_CLOUD_TEMPO_ENDPOINT}
      - GRAFANA_CLOUD_TEMPO_USER=${GRAFANA_CLOUD_TEMPO_USER}
      - GRAFANA_CLOUD_TEMPO_API_KEY=${GRAFANA_CLOUD_TEMPO_API_KEY}
    command: run /etc/alloy/config.alloy --server.http.listen-addr=0.0.0.0:12345
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    ipam:
      driver: default
      config:
        - subnet: 10.50.0.0/16
