version: '3.8'

# Server 2: Redis + RabbitMQ
# 포트는 Server 1 (App)에서만 접근 가능하도록 보안 그룹 설정 필요
# 외부에 포트를 직접 노출하지 않고 0.0.0.0 바인딩은 보안 그룹으로 제한

services:
  redis:
    image: redis:alpine
    container_name: redis-container
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - infra-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: rabbitmq-container
    ports:
      - "5672:5672"
      - "127.0.0.1:15672:15672"   # 관리 UI는 로컬만
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
      - RABBITMQ_DEFAULT_VHOST=/main
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - infra-network
    restart: unless-stopped

volumes:
  redis_data:
  rabbitmq_data:

networks:
  infra-network:
