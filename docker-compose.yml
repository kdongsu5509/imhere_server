# Unified compose
# - local profile: app + Prometheus + Grafana
# - infra profile: RabbitMQ
# - prod profile: dsko + nginx + alloy

services:
  app:
    image: iamhere:latest
    container_name: iamhere-server-container
    profiles:
      - local
    ports:
      - "${APP_HTTP_PORT:-80}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-local}
      - DB_HOST=${DB_HOST:-localhost}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-rati}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - RABBITMQ_HOST=${RABBITMQ_HOST:-rabbitmq}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USER=${RABBITMQ_USER:-local-rabbit}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-local-rabbit}
      - RABBITMQ_VHOST=${RABBITMQ_VHOST:-/main}
    networks:
      - app-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-container
    profiles:
      - local
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - app-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-container
    profiles:
      - local
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/provisioning/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - app-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: rabbitmq-container
    profiles:
      - infra
    expose:
      - "5672"
      - "15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-local-rabbit}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-local-rabbit}
      - RABBITMQ_DEFAULT_VHOST=${RABBITMQ_VHOST:-/main}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - app-network
    restart: unless-stopped

  dsko:
    image: ${ECR_REGISTRY:-local}/${ECR_REPOSITORY:-imhere-server}:latest
    container_name: iamhere-server-container
    profiles:
      - prod
    mem_limit: 1.5g
    labels:
      - "imhere_log_scope=external"
    env_file:
      - ./prod.env
    expose:
      - "8080"
      - "4861"
    volumes:
      - ./secrets/imhereFirebaseKey.json:/app/secrets/imhereFirebaseKey.json:ro
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx-container
    profiles:
      - prod
    mem_limit: 64m
    labels:
      - "imhere_log_scope=internal"
    ports:
      - "443:443"
    env_file:
      - ./prod.env
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/website.html:/usr/share/nginx/html/index.html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      - dsko

  alloy:
    image: grafana/alloy:latest
    container_name: alloy-container
    profiles:
      - prod
    mem_limit: 256m
    labels:
      - "imhere_log_scope=internal"
    env_file:
      - ./prod.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/alloy/alloy-config.alloy:/etc/alloy/config.alloy:ro
    command: run /etc/alloy/config.alloy --server.http.listen-addr=0.0.0.0:12345
    networks:
      - app-network
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  rabbitmq_data:

networks:
  app-network:
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
