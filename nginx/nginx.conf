user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging Settings
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip Settings
    gzip on;
    gzip_disable "msie6";

    # SSL Settings
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Virtual Host Configs
    server {
        listen 443 ssl;
        server_name fortuneki.site www.fortuneki.site;

        # SSL Certificates (Mounted from host Certbot)
        ssl_certificate /etc/letsencrypt/live/fortuneki.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/fortuneki.site/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        location / {
            # --- [CORS Settings Start] ---
            add_header 'Access-Control-Allow-Origin' 'https://fortuneki.site' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            # Preflight (OPTIONS) 요청 즉시 응답 처리
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' 'https://fortuneki.site';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            # --- [CORS Settings End] ---

            # Proxy to Spring Boot Container
            proxy_pass http://dsko:8080;
            
            # 백엔드(Spring)에서 중복 헤더가 넘어오는 경우를 대비해 Nginx 설정 우선 적용
            proxy_hide_header 'Access-Control-Allow-Origin';

            # 클라이언트 실제 정보 전달 설정
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # HTTP(80) 요청을 HTTPS(443)로 강제 리다이렉트
    server {
        listen 80;
        server_name fortuneki.site www.fortuneki.site;

        if ($host = www.fortuneki.site) {
            return 301 https://$host$request_uri;
        }

        if ($host = fortuneki.site) {
            return 301 https://$host$request_uri;
        }

        return 404;
    }
}
