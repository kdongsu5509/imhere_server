name: IMHERE_GITHUB_ACTION_CD

on:
  workflow_run:
    workflows: [ "IMHERE_GITHUB_ACTION_CI" ]
    branches:
      - main
    types:
      - completed

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}
      ECR_REPOSITORY: ${{ secrets.AWS_ECR_REPOSITORY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Generate Image Tag based on date and time
        id: tag
        run: |
          DATE=$(TZ='Asia/Seoul' date +'%Y%m%d-%H%M')
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "tag=${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "corretto"

      - name: Cache Gradle dependencies and wrapper
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Gradle build outputs
        uses: actions/cache@v5
        with:
          path: |
            .gradle
            build/classes
            build/generated
            build/kotlin
            build/tmp
          key: gradle-build-${{ runner.os }}-${{ github.event.workflow_run.head_sha }}
          restore-keys: |
            gradle-build-${{ runner.os }}-

      - name: Inject secret config files
        run: |
          cat << 'EOF' > src/main/resources/application-datasource.yaml
          ${{ secrets.APP_DATASOURCE_YAML }}
          EOF
          cat << 'EOF' > src/main/resources/application-monitoring.yaml
          ${{ secrets.APP_MONITORING_YAML }}
          EOF
          cat << 'EOF' > src/main/resources/application-secret.yaml
          ${{ secrets.APP_SECRET_YAML }}
          EOF

      - name: Create Firebase Key File
        run: |
          cat << 'EOF' > src/main/resources/imhereFirebaseKey.json
          ${{ secrets.FIREBASE_JSON_KEY }}
          EOF
          ls -l src/main/resources/imhereFirebaseKey.json

      - name: Build JAR
        run: |
          chmod +x ./gradlew
          ./gradlew bootJar -x test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        uses: docker/build-push-action@v6
        timeout-minutes: 15
        with:
          context: .
          file: Dockerfile.release
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Get GitHub Actions runner public IP
        id: ip
        run: |
          RUNNER_IP=$(curl -sf https://api.ipify.org)
          echo "runner_ip=${RUNNER_IP}" >> $GITHUB_OUTPUT

      - name: Add runner IP to EC2 security group (SSH port)
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.EC2_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.runner_ip }}/32

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: ECR_REGISTRY,ECR_REPOSITORY,AWS_REGION
          script: |
            aws ecr get-login-password --region $AWS_REGION \
              | docker login --username AWS --password-stdin $ECR_REGISTRY

            cd ${{ secrets.EC2_DEPLOY_PATH }}

            ECR_REGISTRY=$ECR_REGISTRY ECR_REPOSITORY=$ECR_REPOSITORY \
              docker compose -f docker-compose.prod.yml pull dsko

            ECR_REGISTRY=$ECR_REGISTRY ECR_REPOSITORY=$ECR_REPOSITORY \
              docker compose -f docker-compose.prod.yml up -d --no-deps dsko

            docker image prune -f

      - name: Remove runner IP from EC2 security group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.EC2_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.runner_ip }}/32
