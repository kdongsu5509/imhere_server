name: IMHERE_GITHUB_ACTION_CD

on:
  workflow_run:
    workflows: [ "IMHERE_GITHUB_ACTION_CI" ]
    branches:
      - main
    types:
      - completed

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    # OIDC 토큰 발급 권한 — AWS IAM role assume에 필요
    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}
      ECR_REPOSITORY: ${{ secrets.AWS_ECR_REPOSITORY }}
      EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Generate Image Tag based on date and time
        id: tag
        run: |
          DATE=$(TZ='Asia/Seoul' date +'%Y%m%d-%H%M')
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "tag=${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "corretto"

      - name: Cache Gradle dependencies and wrapper
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Gradle build outputs
        uses: actions/cache@v5
        with:
          path: |
            .gradle
            build/classes
            build/generated
            build/kotlin
            build/tmp
          key: gradle-build-${{ runner.os }}-${{ github.event.workflow_run.head_sha }}
          restore-keys: |
            gradle-build-${{ runner.os }}-

      # secrets 파일 없이 JAR 빌드 → 이미지에 민감 정보 미포함
      - name: Build JAR
        run: |
          chmod +x ./gradlew
          ./gradlew test bootJar

      # GitHub OIDC로 IAM role을 assume하여 단기 자격증명을 발급받는다.
      # 정적 access key를 Secret에 보관하지 않으므로 키 만료/노출 위험이 없다.
      # 사전 셋업: docs/cicd.md §4 "AWS OIDC 및 IAM 설정" 참고.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: imhere-github-actions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        uses: docker/build-push-action@v6
        timeout-minutes: 15
        with:
          context: .
          file: Dockerfile.release
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Get GitHub Actions runner public IP
        id: ip
        run: |
          RUNNER_IP=$(curl -sf https://api.ipify.org)
          echo "runner_ip=${RUNNER_IP}" >> $GITHUB_OUTPUT

      - name: Add runner IP to EC2 security group (SSH port)
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.EC2_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.runner_ip }}/32

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Write secret config files to runner temp dir
        run: |
          mkdir -p /tmp/imhere-secrets/config /tmp/imhere-secrets/secrets
          cat << 'EOF' > /tmp/imhere-secrets/config/application-datasource.yaml
          ${{ secrets.APP_DATASOURCE_YAML }}
          EOF
          cat << 'EOF' > /tmp/imhere-secrets/config/application-monitoring.yaml
          ${{ secrets.APP_MONITORING_YAML }}
          EOF
          cat << 'EOF' > /tmp/imhere-secrets/config/application-secret.yaml
          ${{ secrets.APP_SECRET_YAML }}
          EOF
          cat << 'EOF' > /tmp/imhere-secrets/config/application-prod.yaml
          ${{ secrets.APP_PROD_YAML }}
          EOF
          cat << 'EOF' > /tmp/imhere-secrets/secrets/imhereFirebaseKey.json
          ${{ secrets.FIREBASE_JSON_KEY }}
          EOF

      # 이미지가 아닌 EC2 파일시스템에 secrets 전달 → 볼륨 마운트로 런타임 주입
      - name: Copy secret config files to EC2
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "mkdir -p ${EC2_DEPLOY_PATH}/config ${EC2_DEPLOY_PATH}/secrets"
          scp -i ~/.ssh/deploy_key \
            /tmp/imhere-secrets/config/application-datasource.yaml \
            /tmp/imhere-secrets/config/application-monitoring.yaml \
            /tmp/imhere-secrets/config/application-secret.yaml \
            /tmp/imhere-secrets/config/application-prod.yaml \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${EC2_DEPLOY_PATH}/config/"
          scp -i ~/.ssh/deploy_key \
            /tmp/imhere-secrets/secrets/imhereFirebaseKey.json \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${EC2_DEPLOY_PATH}/secrets/"

      # 1. Runner 환경에서 ECR 비밀번호 발급 (OIDC 인증됨)
      - name: Get ECR Login Password
        run: |
          echo "ECR_PASSWORD=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})" >> $GITHUB_ENV

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: ECR_REGISTRY,ECR_REPOSITORY,AWS_REGION,EC2_DEPLOY_PATH,ECR_PASSWORD
          script: |
            # EC2 내부가 아닌 Runner에서 전달받은 비밀번호 사용
            echo "$ECR_PASSWORD" | docker login --username AWS --password-stdin $ECR_REGISTRY

            cd $EC2_DEPLOY_PATH

            ECR_REGISTRY=$ECR_REGISTRY ECR_REPOSITORY=$ECR_REPOSITORY \
              docker compose -f docker-compose.prod.yml pull dsko

            ECR_REGISTRY=$ECR_REGISTRY ECR_REPOSITORY=$ECR_REPOSITORY \
              docker compose -f docker-compose.prod.yml up -d

            docker image prune -f

      - name: Remove runner IP from EC2 security group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.EC2_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.runner_ip }}/32

      - name: Cleanup runner temp files
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          rm -rf /tmp/imhere-secrets
