name: IMHERE_GITHUB_ACTION_CD

on:
  workflow_dispatch:
  workflow_run:
    workflows: [ "IMHERE_GITHUB_ACTION_CI" ]
    branches:
      - main
    types:
      - completed

jobs:
  build-jar:
    name: Build JAR
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    env:
      SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Generate image tag
        id: tag
        run: |
          DATE=$(TZ='Asia/Seoul' date +'%Y%m%d-%H%M')
          SHORT_SHA=$(echo "$SOURCE_SHA" | cut -c1-7)
          echo "tag=${DATE}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "corretto"

      - name: Cache Gradle dependencies and wrapper
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build JAR
        run: |
          chmod +x ./gradlew
          ./gradlew bootJar -x test

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-jar
          path: build/libs/*.jar
          retention-days: 1

  resolve-infra:
    name: Resolve Infra Outputs
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      id-token: write
      contents: read

    outputs:
      ec2_host: ${{ steps.resolve.outputs.ec2_host }}
      rabbitmq_host: ${{ steps.resolve.outputs.rabbitmq_host }}
      security_group_id: ${{ steps.resolve.outputs.security_group_id }}
      instance_id: ${{ steps.resolve.outputs.instance_id }}
      ecr_repository_name: ${{ steps.resolve.outputs.ecr_repository_name }}

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      STACK_NAME: imhere-prod-infra

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: imhere-github-actions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Read CloudFormation outputs
        id: resolve
        run: |
          EC2_HOST=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$AWS_REGION" --query "Stacks[0].Outputs[?OutputKey=='ElasticIp'].OutputValue | [0]" --output text)
          SECURITY_GROUP_ID=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$AWS_REGION" --query "Stacks[0].Outputs[?OutputKey=='SecurityGroupId'].OutputValue | [0]" --output text)
          RABBITMQ_HOST=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$AWS_REGION" --query "Stacks[0].Outputs[?OutputKey=='RabbitMqPrivateIp'].OutputValue | [0]" --output text)
          INSTANCE_ID=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$AWS_REGION" --query "Stacks[0].Outputs[?OutputKey=='Ec2InstanceId'].OutputValue | [0]" --output text)
          ECR_REPOSITORY_NAME=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$AWS_REGION" --query "Stacks[0].Outputs[?OutputKey=='EcrRepositoryName'].OutputValue | [0]" --output text)
          ECR_REPOSITORY_URI=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$AWS_REGION" --query "Stacks[0].Outputs[?OutputKey=='EcrRepositoryUri'].OutputValue | [0]" --output text)

          for value in "$EC2_HOST" "$SECURITY_GROUP_ID" "$RABBITMQ_HOST" "$INSTANCE_ID" "$ECR_REPOSITORY_NAME" "$ECR_REPOSITORY_URI"; do
            if [ -z "$value" ] || [ "$value" = "None" ]; then
              echo "Required CloudFormation output is empty."
              exit 1
            fi
          done

          echo "ec2_host=$EC2_HOST" >> "$GITHUB_OUTPUT"
          echo "rabbitmq_host=$RABBITMQ_HOST" >> "$GITHUB_OUTPUT"
          echo "security_group_id=$SECURITY_GROUP_ID" >> "$GITHUB_OUTPUT"
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "ecr_repository_name=$ECR_REPOSITORY_NAME" >> "$GITHUB_OUTPUT"

  docker-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [ build-jar, resolve-infra ]

    env:
      SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Download JAR artifact
        uses: actions/download-artifact@v7
        with:
          name: app-jar
          path: build/libs/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: imhere-github-actions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Validate Docker image tags
        run: |
          test -n "${ECR_REPOSITORY_URI}"
          test -n "${IMAGE_TAG}"
          echo "Image tag: ${ECR_REPOSITORY_URI}:${IMAGE_TAG}"
          echo "Latest tag: ${ECR_REPOSITORY_URI}:latest"
        env:
          ECR_REPOSITORY_URI: ${{ steps.login-ecr.outputs.registry }}/${{ needs.resolve-infra.outputs.ecr_repository_name }}
          IMAGE_TAG: ${{ needs.build-jar.outputs.tag }}

      - name: Build and push Docker image to ECR
        uses: docker/build-push-action@v6
        timeout-minutes: 15
        with:
          context: .
          file: Dockerfile.release
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ needs.resolve-infra.outputs.ecr_repository_name }}:${{ needs.build-jar.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ needs.resolve-infra.outputs.ecr_repository_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sync-config:
    name: Sync Config
    runs-on: ubuntu-latest
    needs: [ resolve-infra ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare runtime files from config repo
        run: |
          chmod +x ./infra/scripts/sync-config.sh
          CONFIG_REPO_PAT="$CONFIG_REPO_PAT" \
            ./infra/scripts/sync-config.sh --output-dir /tmp/imhere-secrets
        env:
          CONFIG_REPO_PAT: ${{ secrets.CONFIG_REPO_PAT }}

      - name: Upload runtime files artifact
        uses: actions/upload-artifact@v7
        with:
          name: runtime-files
          path: /tmp/imhere-secrets/
          retention-days: 1

  deploy-app:
    name: Deploy App
    runs-on: ubuntu-latest
    needs: [ docker-push, resolve-infra, sync-config ]

    env:
      SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
      EC2_HOST: ${{ needs.resolve-infra.outputs.ec2_host }}
      RABBITMQ_HOST: ${{ needs.resolve-infra.outputs.rabbitmq_host }}
      ECR_REPOSITORY: ${{ needs.resolve-infra.outputs.ecr_repository_name }}
      EC2_SECURITY_GROUP_ID: ${{ needs.resolve-infra.outputs.security_group_id }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: imhere-github-actions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get GitHub Actions runner public IP
        id: ip
        run: |
          RUNNER_IP=$(curl -sf https://api.ipify.org)
          echo "runner_ip=${RUNNER_IP}" >> "$GITHUB_OUTPUT"

      - name: Add runner IP to EC2 security group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id "$EC2_SECURITY_GROUP_ID" \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.runner_ip }}/32 || true

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Prepare EC2 runtime directory
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.EC2_USER }}@${EC2_HOST}" \
            "set -e; \
            if ! command -v docker >/dev/null 2>&1; then sudo dnf install -y docker certbot; fi; \
            if ! sudo docker compose version >/dev/null 2>&1; then \
              sudo mkdir -p /usr/local/lib/docker/cli-plugins; \
              sudo curl -fsSL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 \
                -o /usr/local/lib/docker/cli-plugins/docker-compose; \
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose; \
            fi; \
            sudo systemctl enable --now docker; \
            sudo docker --version; \
            sudo docker compose version; \
            certbot --version; \
            mkdir -p ${EC2_DEPLOY_PATH}/infra/nginx ${EC2_DEPLOY_PATH}/infra/alloy ${EC2_DEPLOY_PATH}/secrets"

      - name: Derive ECR registry
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ECR_REGISTRY=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "$GITHUB_ENV"

      - name: Download runtime files artifact
        uses: actions/download-artifact@v7
        with:
          name: runtime-files
          path: /tmp/imhere-secrets

      - name: Render and copy runtime files to EC2
        run: |
          set -e
          set -a
          . /tmp/imhere-secrets/prod.env
          set +a

          RUNTIME_DIR=/tmp/imhere-runtime
          mkdir -p "$RUNTIME_DIR/infra/nginx" "$RUNTIME_DIR/infra/alloy"
          cp /tmp/imhere-secrets/prod.env "$RUNTIME_DIR/prod.env"
          printf '\nRABBITMQ_HOST=%s\n' "$RABBITMQ_HOST" >> "$RUNTIME_DIR/prod.env"

          python3 - <<'PY'
          from pathlib import Path
          import os

          runtime_dir = Path('/tmp/imhere-runtime')
          templates = {
              'infra/nginx/nginx.conf.template': 'infra/nginx/nginx.conf',
              'infra/alloy/alloy-config.alloy.template': 'infra/alloy/alloy-config.alloy',
          }

          for source, target in templates.items():
              text = Path(source).read_text(encoding='utf-8')
              for key in ('SERVER_NAME', 'CERT_DOMAIN', 'NGINX_ALLOWED_ORIGIN', 'MGMT_BASE_PATH'):
                  value = os.environ.get(key)
                  if not value:
                      raise SystemExit(f'{key} is required to render {source}')
                  text = text.replace('${' + key + '}', value)

              output = runtime_dir / target
              output.parent.mkdir(parents=True, exist_ok=True)
              output.write_text(text, encoding='utf-8')
          PY

          ssh -i ~/.ssh/deploy_key "${{ secrets.EC2_USER }}@${EC2_HOST}" \
            "mkdir -p ${EC2_DEPLOY_PATH}/infra/nginx ${EC2_DEPLOY_PATH}/infra/alloy ${EC2_DEPLOY_PATH}/secrets && \
            rm -rf ${EC2_DEPLOY_PATH}/secrets/imhereFirebaseKey.json"

          scp -i ~/.ssh/deploy_key docker-compose.yml /tmp/imhere-runtime/prod.env "${{ secrets.EC2_USER }}@${EC2_HOST}:${EC2_DEPLOY_PATH}/"
          scp -i ~/.ssh/deploy_key /tmp/imhere-runtime/infra/nginx/nginx.conf "${{ secrets.EC2_USER }}@${EC2_HOST}:${EC2_DEPLOY_PATH}/infra/nginx/nginx.conf"
          scp -i ~/.ssh/deploy_key infra/nginx/website.html "${{ secrets.EC2_USER }}@${EC2_HOST}:${EC2_DEPLOY_PATH}/infra/nginx/website.html"
          scp -i ~/.ssh/deploy_key /tmp/imhere-runtime/infra/alloy/alloy-config.alloy "${{ secrets.EC2_USER }}@${EC2_HOST}:${EC2_DEPLOY_PATH}/infra/alloy/alloy-config.alloy"
          scp -i ~/.ssh/deploy_key /tmp/imhere-secrets/secrets/imhereFirebaseKey.json "${{ secrets.EC2_USER }}@${EC2_HOST}:${EC2_DEPLOY_PATH}/secrets/"

      - name: Get ECR Login Password
        run: |
          echo "ECR_PASSWORD=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})" >> "$GITHUB_ENV"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ needs.resolve-infra.outputs.ec2_host }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: ECR_REGISTRY,ECR_REPOSITORY,AWS_REGION,EC2_DEPLOY_PATH,ECR_PASSWORD
          script: |
            set -e
            echo "$ECR_PASSWORD" | sudo docker login --username AWS --password-stdin "$ECR_REGISTRY"

            cd "$EC2_DEPLOY_PATH"
            set -a
            . ./prod.env
            set +a

            CERT_ALT_DOMAIN="www.$CERT_DOMAIN"
            sudo mkdir -p /etc/letsencrypt/live/"$CERT_DOMAIN"
            if [ ! -f /etc/letsencrypt/options-ssl-nginx.conf ]; then
              sudo curl -fsSL \
                https://raw.githubusercontent.com/certbot/certbot/master/certbot-nginx/certbot_nginx/_internal/tls_configs/options-ssl-nginx.conf \
                -o /etc/letsencrypt/options-ssl-nginx.conf
            fi
            if [ ! -f /etc/letsencrypt/ssl-dhparams.pem ]; then
              sudo curl -fsSL \
                https://raw.githubusercontent.com/certbot/certbot/master/certbot/certbot/ssl-dhparams.pem \
                -o /etc/letsencrypt/ssl-dhparams.pem
            fi
            if [ ! -f /etc/letsencrypt/live/"$CERT_DOMAIN"/fullchain.pem ] || [ ! -f /etc/letsencrypt/live/"$CERT_DOMAIN"/privkey.pem ]; then
              sudo sh -c "printf '%s\n' \
                '[req]' \
                'distinguished_name = req_distinguished_name' \
                'x509_extensions = v3_req' \
                'prompt = no' \
                '' \
                '[req_distinguished_name]' \
                'CN = $CERT_DOMAIN' \
                '' \
                '[v3_req]' \
                'subjectAltName = @alt_names' \
                '' \
                '[alt_names]' \
                'DNS.1 = $CERT_DOMAIN' \
                'DNS.2 = $CERT_ALT_DOMAIN' \
                > /tmp/imhere-cert.cnf"
              sudo openssl req -x509 -nodes -newkey rsa:2048 -days 30 \
                -keyout /etc/letsencrypt/live/"$CERT_DOMAIN"/privkey.pem \
                -out /etc/letsencrypt/live/"$CERT_DOMAIN"/fullchain.pem \
                -config /tmp/imhere-cert.cnf \
                -extensions v3_req
              sudo rm -f /tmp/imhere-cert.cnf
            fi

            sudo env ECR_REGISTRY="$ECR_REGISTRY" ECR_REPOSITORY="$ECR_REPOSITORY" \
              docker compose -f docker-compose.yml --profile prod config >/dev/null
            sudo docker run --rm \
              --add-host dsko:127.0.0.1 \
              -v "$PWD/infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" \
              -v /etc/letsencrypt:/etc/letsencrypt:ro \
              nginx:alpine nginx -t
            if sudo test -f /etc/letsencrypt/renewal/"$CERT_DOMAIN".conf; then
              sudo certbot renew --quiet
            else
              if sudo certbot certonly --standalone \
                --preferred-challenges tls-alpn-01 \
                --non-interactive \
                --agree-tos \
                --register-unsafely-without-email \
                --cert-name "$CERT_DOMAIN" \
                -d "$CERT_DOMAIN" \
                -d "$CERT_ALT_DOMAIN"; then
                echo "Issued Let's Encrypt certificate for $CERT_DOMAIN and $CERT_ALT_DOMAIN."
              else
                echo "Let's Encrypt issuance failed. Using bootstrap certificate."
              fi
            fi

            sudo env ECR_REGISTRY="$ECR_REGISTRY" ECR_REPOSITORY="$ECR_REPOSITORY" \
              docker compose -f docker-compose.yml --profile prod pull

            sudo env ECR_REGISTRY="$ECR_REGISTRY" ECR_REPOSITORY="$ECR_REPOSITORY" \
              docker compose -f docker-compose.yml --profile prod up -d

            sudo docker exec nginx-container nginx -s reload || true

            sudo docker image prune -f

      - name: Remove runner IP from EC2 security group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "$EC2_SECURITY_GROUP_ID" \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.runner_ip }}/32 || true

      - name: Cleanup runner temp files
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          rm -rf /tmp/imhere-secrets
          rm -rf /tmp/imhere-runtime
