<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout :: common-head('약관 관리')}"></head>
<body>
    <header th:replace="~{admin/layout :: common-header}"></header>

    <main class="notion-container">
        <a href="/admin" class="back-to-dashboard">← 대시보드로 돌아가기</a>

        <div class="page-header">
            <h1 class="page-title">약관 관리</h1>
            <p class="page-subtitle">서비스 이용약관 및 동의서 항목 목록을 모니터링합니다.</p>
        </div>

        <div class="feature-card">
            <div class="table-responsive">
                <table class="notion-table">
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>Title</th>
                            <th>Version</th>
                            <th>Required</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="term : ${terms}">
                            <td>
                                <span class="badge purple" th:text="${term.type}"></span>
                            </td>
                            <td th:text="${term.title}" style="font-weight: 600;"></td>
                            <td>
                                <span class="badge gray" th:text="${'v' + term.version}"></span>
                            </td>
                            <td>
                                <span class="badge" 
                                      th:classappend="${term.isRequired ? 'green' : 'gray'}" 
                                      th:text="${term.isRequired ? '필수' : '선택'}"></span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
