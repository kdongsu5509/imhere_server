<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="common-head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">관리자 시스템</title>
    <!-- Import Google Font Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

    <!-- Common Nav Header for Authenticated Pages -->
    <header th:fragment="common-header" class="notion-navbar">
        <div class="nav-container">
            <a href="/admin" class="nav-logo">
                <span class="sticker-dot sky"></span>
                ImHere Admin
            </a>
            <nav class="nav-links">
                <a href="/admin/users" class="nav-link">사용자 관리</a>
                <a href="/admin/terms" class="nav-link">약관 관리</a>
                <a href="/admin/friend-requests" class="nav-link">친구 요청 관리</a>
                <a href="/admin/friend-restrictions" class="nav-link">친구 차단 관리</a>
                <a href="/admin/friendships" class="nav-link">친구 관계 관리</a>
                <a href="/admin/dead-letter-queues" class="nav-link">DLQ 관리</a>
            </nav>
            <form method="post" action="/admin/logout" class="logout-form m-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="button-utility">로그아웃</button>
            </form>
        </div>
    </header>

</body>
</html>
