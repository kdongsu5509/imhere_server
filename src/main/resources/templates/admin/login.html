<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout :: common-head('관리자 로그인')}"></head>
<body>
    <main class="centered-card-container">
        <div class="centered-card">
            <div class="page-header">
                <span class="sticker-dot sky" style="width: 16px; height: 16px; margin-bottom: var(--spacing-xs);"></span>
                <h1 class="page-title" style="font-size: 26px;">관리자 로그인</h1>
                <p class="page-subtitle">ImHere 관리자 계정 ID를 입력해 주세요.</p>
            </div>

            <form method="post" action="/admin/ott/request" class="mt-lg">
                <div class="form-group">
                    <label for="username">관리자 ID</label>
                    <input id="username" 
                           name="username" 
                           type="text" 
                           th:value="${adminId}" 
                           class="text-input" 
                           placeholder="ID를 입력해 주세요" 
                           required 
                           autofocus />
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="button-primary" style="width: 100%; margin-top: var(--spacing-md);">
                    OTT 발급 요청
                </button>
            </form>
        </div>
    </main>
</body>
</html>
