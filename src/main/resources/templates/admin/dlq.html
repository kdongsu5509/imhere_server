<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout :: common-head('DLQ 관리')}"></head>
<body>
    <header th:replace="~{admin/layout :: common-header}"></header>

    <main class="notion-container">
        <a href="/admin" class="back-to-dashboard">← 대시보드로 돌아가기</a>

        <div class="page-header">
            <h1 class="page-title">DLQ 관리</h1>
            <p class="page-subtitle">비정상 처리된 메시지(Dead Letter Queue)를 모니터링하고 재처리 및 삭제 작업을 수행합니다.</p>
        </div>

        <div th:if="${message}" class="notion-alert success">
            <span class="sticker-dot green"></span>
            <span th:text="${message}"></span>
        </div>

        <div class="feature-card">
            <div class="table-responsive">
                <table class="notion-table">
                    <thead>
                        <tr>
                            <th>큐 이름</th>
                            <th>메시지 수</th>
                            <th>컨슈머 수</th>
                            <th>작업</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="queue : ${queues}">
                            <td th:text="${queue.queueName}" style="font-weight: 600;"></td>
                            <td>
                                <span class="badge" 
                                      th:classappend="${queue.messageCount > 0 ? 'red' : 'gray'}"
                                      th:text="${queue.messageCount}"></span>
                            </td>
                            <td th:text="${queue.consumerCount}"></td>
                            <td>
                                <div class="flex-row">
                                    <form th:action="@{/admin/dead-letter-queues/{queueName}/replay-jobs(queueName=${queue.queueName})}" 
                                          method="post" 
                                          class="form-inline m-0">
                                        <input name="count" 
                                               type="number" 
                                               min="1" 
                                               placeholder="개수" 
                                               class="text-input" 
                                               style="width: 80px; display: inline-block; vertical-align: middle; padding: 5px;" 
                                               required />
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <button type="submit" class="button-utility">재처리</button>
                                    </form>
                                    <form th:action="@{/admin/dead-letter-queues/{queueName}/messages/purge(queueName=${queue.queueName})}" 
                                          method="post" 
                                          class="form-inline m-0">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <button type="submit" class="button-utility" style="color: #dc3545; border-color: rgba(220, 53, 69, 0.2);">비우기</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
