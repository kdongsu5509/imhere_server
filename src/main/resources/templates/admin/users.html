<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout :: common-head('사용자 관리')}"></head>
<body>
    <header th:replace="~{admin/layout :: common-header}"></header>

    <main class="notion-container">
        <a href="/admin" class="back-to-dashboard">← 대시보드로 돌아가기</a>

        <div class="page-header">
            <h1 class="page-title">사용자 관리</h1>
            <p class="page-subtitle">서비스에 가입된 사용자의 목록을 조회하고 계정 권한 및 상태를 관리합니다.</p>
        </div>

        <div class="feature-card">
            <div class="table-responsive">
                <table class="notion-table">
                    <thead>
                        <tr>
                            <th>Email</th>
                            <th>Nickname</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.email}" style="font-weight: 500;"></td>
                            <td th:text="${user.nickname}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${user.role.toString() == 'ADMIN' ? 'purple' : 'gray'}"
                                      th:text="${user.role}"></span>
                            </td>
                            <td>
                                <span class="badge"
                                      th:classappend="${user.status.toString() == 'ACTIVE' ? 'green' : (user.status.toString() == 'BLOCKED' ? 'red' : 'gray')}"
                                      th:text="${user.status}"></span>
                            </td>
                            <td style="min-width: 300px;">
                                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                                    <button th:if="${user.status.toString() == 'ACTIVE'}"
                                            th:data-email="${user.email}"
                                            onclick="blockUser(this)"
                                            class="action-btn btn-danger"
                                            style="font-size: 12px; padding: 4px 8px;">차단</button>
                                    <button th:if="${user.status.toString() == 'BLOCKED'}"
                                            th:data-email="${user.email}"
                                            onclick="unblockUser(this)"
                                            class="action-btn btn-success"
                                            style="font-size: 12px; padding: 4px 8px;">차단 해제</button>
                                    <button th:data-email="${user.email}"
                                            onclick="forceLogout(this)"
                                            class="action-btn btn-warning"
                                            style="font-size: 12px; padding: 4px 8px;">강제 로그아웃</button>
                                    <button th:data-email="${user.email}"
                                            onclick="withdrawUser(this)"
                                            class="action-btn btn-danger"
                                            style="font-size: 12px; padding: 4px 8px;">탈퇴</button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script th:inline="javascript">
        const csrfToken = [[${_csrf.token}]];
        const csrfHeader = 'X-CSRF-TOKEN';

        function blockUser(btn) {
            const email = btn.getAttribute('data-email');
            if (!confirm(`${email} 사용자를 차단하시겠습니까?`)) return;
            btn.disabled = true;
            fetch(`/api/admin/users/${email}/block`, {
                method: 'POST',
                headers: { 'X-CSRF-TOKEN': csrfToken }
            })
                .then(r => r.ok ? location.reload() : alert('차단 실패'))
                .catch(() => alert('차단 실패'));
        }

        function unblockUser(btn) {
            const email = btn.getAttribute('data-email');
            if (!confirm(`${email} 사용자를 차단 해제하시겠습니까?`)) return;
            btn.disabled = true;
            fetch(`/api/admin/users/${email}/block`, {
                method: 'DELETE',
                headers: { 'X-CSRF-TOKEN': csrfToken }
            })
                .then(r => r.ok ? location.reload() : alert('차단 해제 실패'))
                .catch(() => alert('차단 해제 실패'));
        }

        function forceLogout(btn) {
            const email = btn.getAttribute('data-email');
            if (!confirm(`${email} 사용자를 강제 로그아웃하시겠습니까?`)) return;
            btn.disabled = true;
            fetch(`/api/admin/users/${email}/token`, {
                method: 'DELETE',
                headers: { 'X-CSRF-TOKEN': csrfToken }
            })
                .then(r => r.ok ? alert('강제 로그아웃 완료') : alert('강제 로그아웃 실패'))
                .catch(() => alert('강제 로그아웃 실패'))
                .finally(() => btn.disabled = false);
        }

        function withdrawUser(btn) {
            const email = btn.getAttribute('data-email');
            if (!confirm(`${email} 사용자를 탈퇴 처리하시겠습니까? 이 작업은 취소할 수 없습니다.`)) return;
            btn.disabled = true;
            fetch(`/api/admin/users/${email}`, {
                method: 'DELETE',
                headers: { 'X-CSRF-TOKEN': csrfToken }
            })
                .then(r => r.ok ? location.reload() : alert('탈퇴 처리 실패'))
                .catch(() => alert('탈퇴 처리 실패'));
        }
    </script>
</body>
</html>
