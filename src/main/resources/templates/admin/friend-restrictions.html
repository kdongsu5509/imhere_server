<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout :: common-head('친구 차단 관리')}"></head>
<body>
    <header th:replace="~{admin/layout :: common-header}"></header>

    <main class="notion-container">
        <a href="/admin" class="back-to-dashboard">← 대시보드로 돌아가기</a>

        <div class="page-header">
            <h1 class="page-title">친구 차단 관리</h1>
            <p class="page-subtitle">사용자 간의 차단 및 제한 내역을 모니터링하고 해제 작업을 수행합니다.</p>
        </div>

        <div th:if="${message}" class="notion-alert success">
            <span class="sticker-dot green"></span>
            <span th:text="${message}"></span>
        </div>

        <div class="feature-card">
            <div class="table-responsive">
                <table class="notion-table">
                    <thead>
                        <tr>
                            <th>Restrictor</th>
                            <th>Restricted</th>
                            <th>Type</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="restriction : ${restrictions}">
                            <td th:text="${restriction.restrictor.email}"></td>
                            <td th:text="${restriction.restricted.email}"></td>
                            <td>
                                <span class="badge" 
                                      th:classappend="${restriction.type.name() == 'BLOCK' ? 'orange' : 'gray'}"
                                      th:text="${restriction.type}"></span>
                            </td>
                            <td>
                                <form th:action="@{/admin/friend-restrictions/{id}/delete(id=${restriction.id})}" 
                                      method="post" 
                                      class="m-0">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="button-utility" style="color: #dc3545; border-color: rgba(220, 53, 69, 0.2);">삭제</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
