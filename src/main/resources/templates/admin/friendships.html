<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout :: common-head('친구 관계 관리')}"></head>
<body>
    <header th:replace="~{admin/layout :: common-header}"></header>

    <main class="notion-container">
        <a href="/admin" class="back-to-dashboard">← 대시보드로 돌아가기</a>

        <div class="page-header">
            <h1 class="page-title">친구 관계 관리</h1>
            <p class="page-subtitle">체결 완료된 사용자 간의 친구 관계 목록을 조회하고 제거합니다.</p>
        </div>

        <div th:if="${message}" class="notion-alert success">
            <span class="sticker-dot green"></span>
            <span th:text="${message}"></span>
        </div>

        <div class="feature-card">
            <div class="table-responsive">
                <table class="notion-table">
                    <thead>
                        <tr>
                            <th>Owner</th>
                            <th>Friend</th>
                            <th>Alias</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="friendship : ${friendships}">
                            <td th:text="${friendship.owner.email}"></td>
                            <td th:text="${friendship.friend.email}"></td>
                            <td th:text="${friendship.friendAlias}" style="color: var(--colors-ink-muted);"></td>
                            <td>
                                <form th:action="@{/admin/friendships/{id}/delete(id=${friendship.id})}" 
                                      method="post" 
                                      class="m-0">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="button-utility" style="color: #dc3545; border-color: rgba(220, 53, 69, 0.2);">삭제</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
