openapi: 3.0.1
info:
  title: ImHere API 문서
  description: User & Notification 통합 API 문서
  version: 0.0.1
servers:
  - url: http://localhost:8080
tags: [ ]
paths:
  /api/admin/friends:
    delete:
      tags:
        - 관리자 - 친구
      summary: 친구 관계 강제 삭제
      description: 두 유저 간의 친구 관계를 양방향 모두 강제 삭제합니다. CS 대응 목적으로 사용합니다.
      operationId: admin-friend-clear-relationship
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-user-terms-consent-33084672"
            examples:
              admin-friend-clear-relationship:
                value: userA=adminA%40kakao.com&userB=adminB%40kakao.com&_csrf=fIOymOp5ugSsOEcz8c7nKx-kDcGXUC5DvxUXGqRGLLPwLmwpGOCDoYwdj2eBWnBWkOPTSC-cIKCnZRtuiiAnLMUgGdfFHwoR
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-consent-33084672"
              examples:
                admin-friend-clear-relationship:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/user/terms:
    get:
      tags:
        - 약관
      summary: 약관 목록 조회
      description: 등록된 약관 종류(Definition) 목록을 페이징하여 반환합니다.
      operationId: terms-list
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-consent-33084672"
              examples:
                terms-list:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"content\":[{\"\
                    termDefinitionId\":4,\"title\":\"서비스 이용약관\",\"termsTypes\":\"\
                    SERVICE\",\"isRequired\":true},{\"termDefinitionId\":5,\"title\"\
                    :\"개인정보 처리방침\",\"termsTypes\":\"PRIVACY\",\"isRequired\":true}],\"\
                    empty\":false,\"first\":true,\"last\":true,\"number\":0,\"numberOfElements\"\
                    :2,\"pageable\":{\"offset\":0,\"pageNumber\":0,\"pageSize\":10,\"\
                    paged\":true,\"sort\":{\"empty\":true,\"sorted\":false,\"unsorted\"\
                    :true},\"unpaged\":false},\"size\":10,\"sort\":{\"empty\":true,\"\
                    sorted\":false,\"unsorted\":true},\"totalElements\":2,\"totalPages\"\
                    :1}}"
  /api/admin/friends/requests:
    delete:
      tags:
        - 관리자 - 친구
      summary: 친구 요청 강제 삭제
      description: requester → receiver 방향의 친구 요청을 강제 삭제합니다. CS 대응 목적으로 사용합니다.
      operationId: admin-friend-clear-request
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-user-terms-consent-33084672"
            examples:
              admin-friend-clear-request:
                value: requester=req%40kakao.com&receiver=rcv%40kakao.com&_csrf=BRkNxCuku9MgAU6TMUfBmSHTg-Z6UNT9eHTwjq566tdCh9T9NX88oUnB2uQNY3agB2r1r0K2roQYMbbQSkSV6ssb3-Rx4uXK
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-consent-33084672"
              examples:
                admin-friend-clear-request:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/admin/terms/definition:
    post:
      tags:
        - 관리자 - 약관
      summary: 약관 종류(Definition) 생성
      description: 새로운 약관 종류를 등록합니다. required=true이면 필수 동의 약관입니다.
      operationId: admin-terms-create-definition
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-user-terms-consent-33084672"
            examples:
              admin-terms-create-definition:
                value: "{\"termsName\":\"위치 정보 이용 약관\",\"termsType\":\"LOCATION\"\
                  ,\"required\":true}"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-consent-33084672"
              examples:
                admin-terms-create-definition:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/admin/terms/version:
    post:
      tags:
        - 관리자 - 약관
      summary: 약관 버전 등록
      description: |-
        새로운 약관 버전을 등록합니다.
        기존 활성화된 버전은 자동으로 비활성화(isActive=false)되며, 새 버전이 활성 버전이 됩니다.
      operationId: admin-terms-create-version
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-user-terms-consent-33084672"
            examples:
              admin-terms-create-version:
                value: "{\"termDefinitionId\":2,\"version\":\"v1.0\",\"content\":\"\
                  테스트 내용\",\"effectiveDate\":\"2026-04-13T00:56:00.3316336\"}"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-consent-33084672"
              examples:
                admin-terms-create-version:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/user/auth/login:
    post:
      tags:
        - 인증
      summary: 카카오 OAuth 로그인 / 기존 유저
      description: 기존 ACTIVE 유저 로그인. 200 OK와 함께 accessToken/refreshToken이 재발급됩니다.
      operationId: auth-login-
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-user-terms-consent-33084672"
            examples:
              auth-login-existing:
                value: "{\"provider\":\"KAKAO\",\"idToken\":\"eyJ0eXAiOiJKV1QiLCJraWQiOiJ0ZXN0LWtpZCIsImFsZyI6IlJTMjU2In0..QUQSPOoAx0oF6lYCD3_8YhIxnZCnextIQPy8nu5upbEIahpASBd_gQVX3kH80nkJRmpYakEr0UDUJzUwLkU2pg0qo6zJeBFF-G15c0SU_IgGH_DEZ4TFyUYphFr00rJOv597tjl6PQUBG7iyc2AI50HWDMUK2RcPB8uxmxtN9g-tTDOy7VKSplCKQ1exFr5nbEOx_3yS1Q0Jbrqf-FOHvA-sOymk9pNiFzcqOpLqKVG_46lzG-UK_n2u8SRoDdZIlvHZofs6Z6Xx5ixMdZOTFdqWr4-2qbHAs9v9DEb6MbGxv3FK7YwzuTU7UpznWyYZb1F3Sz3GqyUudAyNhsUlbg\"\
                  }"
              auth-login-new:
                value: "{\"provider\":\"KAKAO\",\"idToken\":\"eyJ0eXAiOiJKV1QiLCJraWQiOiJ0ZXN0LWtpZCIsImFsZyI6IlJTMjU2In0..OGzlwZMlQzR3FxdiLj6S2BQ1vyACe4LPwjA1y5PwjSWmBYm-TxSjqkHDOI5eelldvsxZqqdqBu0Sv4y4KTUQIZeaDPEJOoyiu2c0CKUJyaoNIw_sDjXajVmJHMVYyc-4sr8HpBycgotAG1Xk_0ZOTEwIDAHUA7X1Zoeeh3hmp5NqnxXscXYj2MMEQgsLxY6ukKb9koU9CMvpqhwhi63lu08R0hJkwDt0HVoZ2TQqb-ayTx5P736U5CgD49IvAyPgAxw9Zrgff9tgdOazV0ZkxcPqd_QX7DIdiwOnUu4tebCKsi1gEszXTFjk9C3sK0p0pTv_lXHLIPKKxye7XYsjKg\"\
                  }"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-consent-33084672"
              examples:
                auth-login-existing:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..pNwDUEOkzO1jPdaOlnhWWYydAy0_ADV-0QBaaUUADyh78Jci674ID4_9aYB99-FE\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..qmh4SEwE7vdOmb7EStcRsthzd8NK3HeaR2JC7j8SZz2CY8IEOhcfDhQ2Xze519N-\"\
                    }}"
        "201":
          description: "201"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-consent-33084672"
              examples:
                auth-login-new:
                  value: "{\"code\":201,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..7qoKrEENHKrp5P7C6ki1tcheEMBoC0TqeR-ZUKzEbvW0STtxExfPBZVfkH86o0tm\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..vrlX6Uc335AQnGneNNWtLmVJhe-YfaR6aMl1c4tspXNFZ0PaNWBX55RivK8ZalJy\"\
                    }}"
  /api/user/auth/reissue:
    post:
      tags:
        - 인증
      summary: JWT 토큰 재발급
      description: 유효한 refreshToken으로 accessToken/refreshToken을 재발급합니다.
      operationId: auth-reissue
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-user-terms-consent-33084672"
            examples:
              auth-reissue:
                value: "{\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..43j1v9F6ofI1avy4M7pZDyefWubqft0-I3lJUXkbTEKED4OHJvs1AxPVLBux5_Im\"\
                  }"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-consent-33084672"
              examples:
                auth-reissue:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..V7-YSt2r4S2X-2_REh3zE76h-Dz389bt_9mnN1jSE6chxinJGnR2mydU0zY6CptB\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..QywgGEqzDjFcROXMC1OoKtCoXuQSWYJm5dVCVbHRVvcVjXPauRlnBmqMkm2ZsOTU\"\
                    }}"
  /api/user/info/me:
    get:
      tags:
        - 사용자
      summary: 내 정보 조회
      description: "로그인한 사용자의 이메일, 닉네임 정보를 반환합니다."
      operationId: user-get-me
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-consent-33084672"
              examples:
                user-get-me:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"userEmail\"\
                    :\"owner@owner.com\",\"userNickname\":\"owner\"}}"
  /api/user/info/nickname:
    post:
      tags:
        - 사용자
      summary: 닉네임 변경
      description: 로그인한 사용자의 닉네임을 변경합니다.
      operationId: user-change-nickname
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-user-terms-consent-33084672"
            examples:
              user-change-nickname:
                value: "{\"newNickname\":\"고동수\"}"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-consent-33084672"
              examples:
                user-change-nickname:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"userEmail\"\
                    :\"owner@owner.com\",\"userNickname\":\"고동수\"}}"
  /api/user/info/tester:
    get:
      tags:
        - 사용자
      summary: 닉네임으로 유저 검색
      description: 닉네임 키워드로 유저를 검색합니다. 동일 닉네임의 복수 결과가 반환될 수 있습니다.
      operationId: user-search-by-nickname
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-consent-33084672"
              examples:
                user-search-by-nickname:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":[{\"userId\":\"\
                    b2ddfded-da55-49ad-8c0b-bd6d91f95120\",\"userEmail\":\"exist@test.com\"\
                    ,\"userNickname\":\"tester\"}]}"
  /api/user/terms/consent:
    post:
      tags:
        - 약관 동의
      summary: 전체 약관 일괄 동의
      description: |-
        PENDING 상태의 사용자가 약관에 동의합니다.
        **모든 필수(required=true) 약관에 동의 완료 시 사용자 상태가 PENDING → ACTIVE로 자동 전환됩니다.**
        전환 후 새로운 accessToken/refreshToken이 재발급되어 응답에 포함됩니다.
      operationId: terms-consent-all
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-user-terms-consent-33084672"
            examples:
              terms-consent-all:
                value: "{\"consents\":[{\"termDefinitionId\":1,\"agreed\":true},{\"\
                  termDefinitionId\":2,\"agreed\":true},{\"termDefinitionId\":3,\"\
                  agreed\":true}]}"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-consent-33084672"
              examples:
                terms-consent-all:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..CgLr1iAndoscjD4aSvQPmgbM4-AMlBbidFhXdwyvDh-4YFfzM2rmG2YFzEjzepEE\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..vd4Fi76xAwqG_Le9lOlB4ShhFbgvFxJqNwIFrkGQUOMXUUOcrGvuR8KY_dZLHy0i\"\
                    }}"
      security:
        - bearerAuthJWT: [ ]
  /api/admin/users/{email}/block:
    post:
      tags:
        - 관리자 - 사용자
      summary: 유저 서비스 차단
      description: 특정 유저의 상태를 BLOCKED로 변경하여 서비스 이용을 차단합니다.
      operationId: admin-user-block
      parameters:
        - name: email
          in: path
          description: ""
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-user-terms-consent-33084672"
            examples:
              admin-user-block:
                value: _csrf=RkonPMv0o6_w381eM16v-Vc_eOXwxKM6InjrOeKoGvNBD3-3fy4VDvjDls3d6alqV3ObmDZaVYeSosUXFUraC9CffMR5bUnS
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-consent-33084672"
              examples:
                admin-user-block:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
    delete:
      tags:
        - 관리자 - 사용자
      summary: 유저 차단 해제
      description: BLOCKED 상태의 유저를 ACTIVE로 복구합니다.
      operationId: admin-user-unblock
      parameters:
        - name: email
          in: path
          description: ""
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-user-terms-consent-33084672"
            examples:
              admin-user-unblock:
                value: _csrf=6-VGowoRQGWulWXDTiclBX8vvwBvSi3GJ-yLnky6rr442kEU3NF-lmt1JVGDplOifAoRNRxJkmJcfB3rEduzpi6Dz49Z6yQi
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-consent-33084672"
              examples:
                admin-user-unblock:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/admin/users/{email}/token:
    delete:
      tags:
        - 관리자 - 사용자
      summary: 유저 강제 로그아웃
      description: Redis에서 해당 유저의 refreshToken을 삭제하여 강제 로그아웃시킵니다.
      operationId: admin-user-force-logout
      parameters:
        - name: email
          in: path
          description: ""
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-user-terms-consent-33084672"
            examples:
              admin-user-force-logout:
                value: _csrf=mvcJAixsqoT6F85OiBn-KuWAQSaRlz-68YxuMKup67UrmgntqJM9YRxbmebXcvp57jTKGN21bB-holyXx71aU86d2YcarjHU
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-consent-33084672"
              examples:
                admin-user-force-logout:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/user/terms/version/{termsDefinitionId}:
    get:
      tags:
        - 약관
      summary: 약관 버전 상세 조회
      description: 특정 약관(termDefinitionId)의 현재 활성화된 버전 내용을 반환합니다.
      operationId: terms-version-detail
      parameters:
        - name: termsDefinitionId
          in: path
          description: ""
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-consent-33084672"
              examples:
                terms-version-detail:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"version\":\"\
                    v1.0\",\"content\":\"약관 내용\",\"effectiveDate\":\"2026-04-12T00:56:00.4158669\"\
                    }}"
components:
  schemas:
    api-user-terms-consent-33084672:
      type: object
  securitySchemes:
    bearerAuthJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
