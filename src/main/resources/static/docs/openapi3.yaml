openapi: 3.0.1
info:
  title: ImHere API 문서
  description: User & Notification 통합 API 문서
  version: 0.0.1
servers:
- url: http://localhost:8080
tags: []
paths:
  /api/admin/friends:
    delete:
      tags:
      - 관리자 - 친구
      summary: 친구 관계 강제 삭제
      description: 두 유저 간의 친구 관계를 양방향 모두 강제 삭제합니다. CS 대응 목적으로 사용합니다.
      operationId: admin-friend-clear-relationship
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-admin-users-email-block-33084672"
            examples:
              admin-friend-clear-relationship:
                value: userA=adminA%40kakao.com&userB=adminB%40kakao.com&_csrf=d-O_RxOe9lMxBVn1LPmcdR1HuNSm1KzDkFCKsqM-jEi_szUyFdaJIiH7xjIcMmqXFdSoQCVxleyQ4pXuqDHui5YNtHmKgAcK
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-users-email-block-33084672"
              examples:
                admin-friend-clear-relationship:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/user/terms:
    get:
      tags:
      - 약관
      summary: 약관 목록 조회
      description: 등록된 약관 종류(Definition) 목록을 페이징하여 반환합니다.
      operationId: terms-list
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-users-email-block-33084672"
              examples:
                terms-list:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"content\":[{\"\
                    termDefinitionId\":4,\"title\":\"서비스 이용약관\",\"termsTypes\":\"\
                    SERVICE\",\"isRequired\":true},{\"termDefinitionId\":5,\"title\"\
                    :\"개인정보 처리방침\",\"termsTypes\":\"PRIVACY\",\"isRequired\":true}],\"\
                    empty\":false,\"first\":true,\"last\":true,\"number\":0,\"numberOfElements\"\
                    :2,\"pageable\":{\"offset\":0,\"pageNumber\":0,\"pageSize\":10,\"\
                    paged\":true,\"sort\":{\"empty\":true,\"sorted\":false,\"unsorted\"\
                    :true},\"unpaged\":false},\"size\":10,\"sort\":{\"empty\":true,\"\
                    sorted\":false,\"unsorted\":true},\"totalElements\":2,\"totalPages\"\
                    :1}}"
  /api/admin/friends/requests:
    delete:
      tags:
      - 관리자 - 친구
      summary: 친구 요청 강제 삭제
      description: requester → receiver 방향의 친구 요청을 강제 삭제합니다. CS 대응 목적으로 사용합니다.
      operationId: admin-friend-clear-request
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-admin-users-email-block-33084672"
            examples:
              admin-friend-clear-request:
                value: requester=req%40kakao.com&receiver=rcv%40kakao.com&_csrf=dBJawD5DL1ZoDb1aOG8amQqvhVF_wbZ5MbulOhzXCozHTjGMRyVsoQd3FjRFOIVjCkIu-26aqDMeooFUB4LDCC2ybrSidwC5
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-users-email-block-33084672"
              examples:
                admin-friend-clear-request:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/admin/terms/definition:
    post:
      tags:
      - 관리자 - 약관
      summary: 약관 종류(Definition) 생성
      description: 새로운 약관 종류를 등록합니다. required=true이면 필수 동의 약관입니다.
      operationId: admin-terms-create-definition
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-users-email-block-33084672"
            examples:
              admin-terms-create-definition:
                value: "{\"termsName\":\"위치 정보 이용 약관\",\"termsType\":\"LOCATION\"\
                  ,\"required\":true}"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-users-email-block-33084672"
              examples:
                admin-terms-create-definition:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/admin/terms/version:
    post:
      tags:
      - 관리자 - 약관
      summary: 약관 버전 등록
      description: |-
        새로운 약관 버전을 등록합니다.
        기존 활성화된 버전은 자동으로 비활성화(isActive=false)되며, 새 버전이 활성 버전이 됩니다.
      operationId: admin-terms-create-version
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-users-email-block-33084672"
            examples:
              admin-terms-create-version:
                value: "{\"termDefinitionId\":2,\"version\":\"v1.0\",\"content\":\"\
                  테스트 내용\",\"effectiveDate\":\"2026-04-14T22:02:29.279535\"}"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-users-email-block-33084672"
              examples:
                admin-terms-create-version:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/user/auth/login:
    post:
      tags:
      - 인증
      summary: 카카오 OAuth 로그인 / 기존 유저
      description: 기존 ACTIVE 유저 로그인. 200 OK와 함께 accessToken/refreshToken이 재발급됩니다.
      operationId: auth-login-
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-users-email-block-33084672"
            examples:
              auth-login-existing:
                value: "{\"provider\":\"KAKAO\",\"idToken\":\"eyJ0eXAiOiJKV1QiLCJraWQiOiJ0ZXN0LWtpZCIsImFsZyI6IlJTMjU2In0..EQEQuShTU8GS87XRIrQoQ8o7RSldL2t0b52_6UkoEUQR0Bgi6uTg2J021VgSqzLOCwxqiXWVhn2yAbgBr3IJ6tLzhiP1Dpb3tOM7Gyi2SUFZNrO3s1VUpdao2neVOgvbITLC9JIkh0UoVSKgkAmvTDdu4g7detTzI9BjUKw-9oNV68ENTJGQzBjUHn7DrU1cwh9dXx5mjXrSdLIsMuW80Kk4EG2zLPHlgoA2eDaCfG-WblRhOvxbnIwJKYQuHtIbt-T4xe43iIE-8c40IJFgRsEYx6i8cTUUTxz82qPTALqijO6xVF04RK-dpZ9LWyQ_9H_kfSiRqaRu6td-jtPLSg\"\
                  }"
              auth-login-new:
                value: "{\"provider\":\"KAKAO\",\"idToken\":\"eyJ0eXAiOiJKV1QiLCJraWQiOiJ0ZXN0LWtpZCIsImFsZyI6IlJTMjU2In0..sVIK6_Sc_3ewgaBcwGL7P4bXN1vmFCzalsIP_V0h31o-aWRmLAiU54p0yDYTe0b0pq5jmADz6Cpn4rt_FNgFgL4b8tsy1ipqOBwI5RfbH3yEMo8tZG1WU3HMuTfiXlvPjQ3Q740eMmcA1LhYfds8epJ3U9opK3OdpOsMMWXD9aoyFHer2bmXiZ9a45lJvKEB7ZMA05vVhlbuDLTdb5pg2EX2ZFbeqic7So9oKmj_AMnuVvbg_2nSaOMm_MPtuVA5VkMseNcvy6XMkVBeNcCxeL4PAZFk8ABHNjAD624vOy1fKMoA3hQRJuJmZJolVSErwp-QJ8zhJSWFiZkNhygfLw\"\
                  }"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-users-email-block-33084672"
              examples:
                auth-login-existing:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..-z1FDi_yE9cvWtqiNeHJehKRHsmmN2dbffqe1UGEmikAuUXX_RaOShr69oW_2MQv\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..MFLXkf-ll4VBEeLQbaQuYMfzmh8MDJb8dc_zZVhqtFgR3H0K2B49n20suKDmYiF8\"\
                    }}"
        "201":
          description: "201"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-users-email-block-33084672"
              examples:
                auth-login-new:
                  value: "{\"code\":201,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..3ps2-eeeyli86nIdcN7gdIlTYxbteV_fH5WYfQ-qWKig4wo_bGUyG8OpPKZkozXY\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..oxld_s9jU-xQQ5Hc14eWXPOVp7cO71f9PmXQbHzFOphmArwwD_2HEqkb78eQ2oU7\"\
                    }}"
  /api/user/auth/reissue:
    post:
      tags:
      - 인증
      summary: JWT 토큰 재발급
      description: 유효한 refreshToken으로 accessToken/refreshToken을 재발급합니다.
      operationId: auth-reissue
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-users-email-block-33084672"
            examples:
              auth-reissue:
                value: "{\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..0coyAlfncAf_-EovmwzRQ8ioywNPvtHXgnq5M6gaG3Q9HKEjcztb6EJ-AidzMLUS\"\
                  }"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-users-email-block-33084672"
              examples:
                auth-reissue:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..GpEx0Zywp4G0K_gtSKlSTR2iXx6QPijnpXkyZprmRfDLH56YC-UTO9pqBihxKM0Q\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..HCMe5zt5yXkvtObVEBWNCBEE8tPj-vnAGw-eW_6h7b152RWoP8kW6h4HrVzGrCAM\"\
                    }}"
  /api/user/info/me:
    get:
      tags:
      - 사용자
      summary: 내 정보 조회
      description: "로그인한 사용자의 이메일, 닉네임 정보를 반환합니다."
      operationId: user-get-me
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-users-email-block-33084672"
              examples:
                user-get-me:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"userEmail\"\
                    :\"owner@owner.com\",\"userNickname\":\"owner\"}}"
  /api/user/info/nickname:
    post:
      tags:
      - 사용자
      summary: 닉네임 변경
      description: 로그인한 사용자의 닉네임을 변경합니다.
      operationId: user-change-nickname
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-users-email-block-33084672"
            examples:
              user-change-nickname:
                value: "{\"newNickname\":\"고동수\"}"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-users-email-block-33084672"
              examples:
                user-change-nickname:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"userEmail\"\
                    :\"owner@owner.com\",\"userNickname\":\"고동수\"}}"
  /api/user/info/tester:
    get:
      tags:
      - 사용자
      summary: 닉네임으로 유저 검색
      description: 닉네임 키워드로 유저를 검색합니다. 동일 닉네임의 복수 결과가 반환될 수 있습니다.
      operationId: user-search-by-nickname
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-users-email-block-33084672"
              examples:
                user-search-by-nickname:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":[{\"userId\":\"\
                    171597fd-d04f-4142-98d8-06c7c2ef3d68\",\"userEmail\":\"exist@test.com\"\
                    ,\"userNickname\":\"tester\"}]}"
  /api/user/terms/consent:
    post:
      tags:
      - 약관 동의
      summary: 전체 약관 일괄 동의
      description: |-
        PENDING 상태의 사용자가 약관에 동의합니다.
        **모든 필수(required=true) 약관에 동의 완료 시 사용자 상태가 PENDING → ACTIVE로 자동 전환됩니다.**
        전환 후 새로운 accessToken/refreshToken이 재발급되어 응답에 포함됩니다.
      operationId: terms-consent-all
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-users-email-block-33084672"
            examples:
              terms-consent-all:
                value: "{\"consents\":[{\"termDefinitionId\":1,\"agreed\":true},{\"\
                  termDefinitionId\":2,\"agreed\":true},{\"termDefinitionId\":3,\"\
                  agreed\":true}]}"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-users-email-block-33084672"
              examples:
                terms-consent-all:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..XKRZTE2g1-xKqAkVYTnxf5apancyEKQWg3nqYqymjDnxzBs336qm_uCWxtemn-mC\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..ph7faea3aA2xRZgfD6nf6p5jUw9DWrUmZVI7yUnmDgtWpWHExSpeIm0GTxuiMhqY\"\
                    }}"
      security:
      - bearerAuthJWT: []
  /api/admin/users/{email}/block:
    post:
      tags:
      - 관리자 - 사용자
      summary: 유저 서비스 차단
      description: 특정 유저의 상태를 BLOCKED로 변경하여 서비스 이용을 차단합니다.
      operationId: admin-user-block
      parameters:
      - name: email
        in: path
        description: ""
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-admin-users-email-block-33084672"
            examples:
              admin-user-block:
                value: _csrf=VBPyyUepkOyBYRyc_gF8H04IGDR0CyVWAeThQ1xHre0t-TJfYnaR_XOZ9d2sUSyrnyxIfHxpNQwRaBR7MtPWdW53zNxPyQZs
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-users-email-block-33084672"
              examples:
                admin-user-block:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
    delete:
      tags:
      - 관리자 - 사용자
      summary: 유저 차단 해제
      description: BLOCKED 상태의 유저를 ACTIVE로 복구합니다.
      operationId: admin-user-unblock
      parameters:
      - name: email
        in: path
        description: ""
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-admin-users-email-block-33084672"
            examples:
              admin-user-unblock:
                value: _csrf=EXCNV-8px0kRwU4WC_GJY4DhtGVfwwrFfHQs98gGHaDUbS1TIkXpZotM8n08p38nady9W7KHmV088WvoRU1Ixv01fMHtXU81
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-users-email-block-33084672"
              examples:
                admin-user-unblock:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/admin/users/{email}/token:
    delete:
      tags:
      - 관리자 - 사용자
      summary: 유저 강제 로그아웃
      description: Redis에서 해당 유저의 refreshToken을 삭제하여 강제 로그아웃시킵니다.
      operationId: admin-user-force-logout
      parameters:
      - name: email
        in: path
        description: ""
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-admin-users-email-block-33084672"
            examples:
              admin-user-force-logout:
                value: _csrf=J1Y6NpzQJTIaTEpJ9oJR1drkZ-jSIwX3Nlo9fEhTCkxcR2HWE28DVPjgQwU3L38qwq9l4eOCSomxEDfaBmtcSXBra34-d1fn
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-users-email-block-33084672"
              examples:
                admin-user-force-logout:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/user/terms/version/{termsDefinitionId}:
    get:
      tags:
      - 약관
      summary: 약관 버전 상세 조회
      description: 특정 약관(termDefinitionId)의 현재 활성화된 버전 내용을 반환합니다.
      operationId: terms-version-detail
      parameters:
      - name: termsDefinitionId
        in: path
        description: ""
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-users-email-block-33084672"
              examples:
                terms-version-detail:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"version\":\"\
                    v1.0\",\"content\":\"약관 내용\",\"effectiveDate\":\"2026-04-13T22:02:29.3647145\"\
                    }}"
components:
  schemas:
    api-admin-users-email-block-33084672:
      type: object
  securitySchemes:
    bearerAuthJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
