openapi: 3.0.1
info:
  title: ImHere API 문서
  description: User & Notification 통합 API 문서
  version: 0.0.1
servers:
- url: http://localhost:8080
tags: []
paths:
  /api/admin/friends:
    delete:
      tags:
      - 관리자 - 친구
      summary: 친구 관계 강제 삭제
      description: 두 유저 간의 친구 관계를 양방향 모두 강제 삭제합니다. CS 대응 목적으로 사용합니다.
      operationId: admin-friend-clear-relationship
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-user-terms-33084672"
            examples:
              admin-friend-clear-relationship:
                value: userA=adminA%40kakao.com&userB=adminB%40kakao.com&_csrf=tcZrOSIYgVZT15AktwPt08LZ_B5JX2jNVZbgNxTtqJnyZSC-0fcPDkcgs2J-4qUXgC7Z6vq_0X8tOgngZfeBByCIma_EBxbY
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                admin-friend-clear-relationship:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/user/terms:
    get:
      tags:
      - 약관
      summary: 약관 목록 조회
      description: 등록된 약관 종류(Definition) 목록을 페이징하여 반환합니다.
      operationId: terms-list
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                terms-list:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"content\":[{\"\
                    termDefinitionId\":4,\"title\":\"서비스 이용약관\",\"termsTypes\":\"\
                    SERVICE\",\"isRequired\":true},{\"termDefinitionId\":5,\"title\"\
                    :\"개인정보 처리방침\",\"termsTypes\":\"PRIVACY\",\"isRequired\":true}],\"\
                    empty\":false,\"first\":true,\"last\":true,\"number\":0,\"numberOfElements\"\
                    :2,\"pageable\":{\"offset\":0,\"pageNumber\":0,\"pageSize\":10,\"\
                    paged\":true,\"sort\":{\"empty\":true,\"sorted\":false,\"unsorted\"\
                    :true},\"unpaged\":false},\"size\":10,\"sort\":{\"empty\":true,\"\
                    sorted\":false,\"unsorted\":true},\"totalElements\":2,\"totalPages\"\
                    :1}}"
  /api/admin/friends/requests:
    delete:
      tags:
      - 관리자 - 친구
      summary: 친구 요청 강제 삭제
      description: requester → receiver 방향의 친구 요청을 강제 삭제합니다. CS 대응 목적으로 사용합니다.
      operationId: admin-friend-clear-request
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-user-terms-33084672"
            examples:
              admin-friend-clear-request:
                value: requester=req%40kakao.com&receiver=rcv%40kakao.com&_csrf=6ARLO5Y9N9CWRbWEEalT5ARrBqY6UW_MP9pUe1ENaRfpWblq2mZ6Cq4OD-a7JozhJIRn3DZfK8RYY1_hB79sHzI4WHOKb4tY
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                admin-friend-clear-request:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/admin/terms/definition:
    post:
      tags:
      - 관리자 - 약관
      summary: 약관 종류(Definition) 생성
      description: 새로운 약관 종류를 등록합니다. required=true이면 필수 동의 약관입니다.
      operationId: admin-terms-create-definition
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-user-terms-33084672"
            examples:
              admin-terms-create-definition:
                value: "{\"termsName\":\"위치 정보 이용 약관\",\"termsType\":\"LOCATION\"\
                  ,\"required\":true}"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                admin-terms-create-definition:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/admin/terms/version:
    post:
      tags:
      - 관리자 - 약관
      summary: 약관 버전 등록
      description: |-
        새로운 약관 버전을 등록합니다.
        기존 활성화된 버전은 자동으로 비활성화(isActive=false)되며, 새 버전이 활성 버전이 됩니다.
      operationId: admin-terms-create-version
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-user-terms-33084672"
            examples:
              admin-terms-create-version:
                value: "{\"termDefinitionId\":2,\"version\":\"v1.0\",\"content\":\"\
                  테스트 내용\",\"effectiveDate\":\"2026-04-13T20:24:20.0529067\"}"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                admin-terms-create-version:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/user/auth/login:
    post:
      tags:
      - 인증
      summary: 카카오 OAuth 로그인 / 기존 유저
      description: 기존 ACTIVE 유저 로그인. 200 OK와 함께 accessToken/refreshToken이 재발급됩니다.
      operationId: auth-login-
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-user-terms-33084672"
            examples:
              auth-login-existing:
                value: "{\"provider\":\"KAKAO\",\"idToken\":\"eyJ0eXAiOiJKV1QiLCJraWQiOiJ0ZXN0LWtpZCIsImFsZyI6IlJTMjU2In0..SD2gMAVnF-R1SURIOZULsj8GRXX4CVCnUsfh01STLxQ4YaSqM26SUyCCkXnhRWE8QczUm0D-3lAsYE78RKeYzxsnKOK0nTvXprLb8AWTBFjCNfIjKInkNmMkemz_lMqVWyhj_2DUa9xk4MMhs_dm5bPpgWonWOh7CfIk4TUY_dOzIqeZ5ITIlU2xfFrjL632IvPJTKZDbP0cA7qyUb0czgpOw0MEUg-0yMB0ARM1sHmZnQoAbI309HD7--YSPvh1qX33mTtxfKrPsTSTn6FN0pv5VPG5wu8-nsxO3egUPx89094SksiwlsxlWQtlZKYAQ3fF9hyTGpbSb-1XBzwI5g\"\
                  }"
              auth-login-new:
                value: "{\"provider\":\"KAKAO\",\"idToken\":\"eyJ0eXAiOiJKV1QiLCJraWQiOiJ0ZXN0LWtpZCIsImFsZyI6IlJTMjU2In0..dlUyT1G4wt63B-mxQWX9SGb_EZlexcNViyvuMuQc65bOhSnKY7K0mB_t-N45CYzDYVTvYCcsfPKseeGj5_KBK304hul-wRF8PuwK0wIyY4IkbRC6Pz8p5kV7xlBWxVAv-EHksFykSeMwH5rDeM70AfWBXCJ1uyAT9bBNM-decgMi4pks0mJ3TarKBo53DrepsuF9JC5da352sxeOrO2N_f6zJi3b9yQV_LTUAWaBLwvKw7QK6a0WAHdpNXjF4sMhqJVLgbpA0HAYXSx4dC8j2Xq8Yfj_jUVrhcxWGvtuVeIu7CbKcWyi2LWNf-NA4MR3FitJ_s6npDnOGCb1-GQEJQ\"\
                  }"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                auth-login-existing:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..QKnf0Qtl9TDNop5BxNfEyRO2-nDU-xdTV5pOSqzVFNxVtnK2NpE_SaZiIghS32MQ\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..9mZRo1-G0M0w12xZUipgW7q7hDU0aQyMekg6cSgAuWVHbZFOBnEwAcKqX42X3trc\"\
                    }}"
        "201":
          description: "201"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                auth-login-new:
                  value: "{\"code\":201,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..MOVhg0GRkaE7tonL-ILtY84ecIegK8sRkFzfI88W7Ab3JPBUd_ueGA1Kap2bKsJp\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..mLcSagqjbxN8CTJIafS4zm6THhEsUqAbvc1ajOt4e72g0sTqhxvT0mVevemH1mXz\"\
                    }}"
  /api/user/auth/reissue:
    post:
      tags:
      - 인증
      summary: JWT 토큰 재발급
      description: 유효한 refreshToken으로 accessToken/refreshToken을 재발급합니다.
      operationId: auth-reissue
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-user-terms-33084672"
            examples:
              auth-reissue:
                value: "{\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..Fp4Eyc-e-bjJQiBiuwUsnB9SrMVBmc3VJ5ZeIBMVyMi7HgyaNBNXQAoFywmrlQGD\"\
                  }"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                auth-reissue:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..NlGlqLqb6q_9YSCIcBDabWHYqNdkxaDQhCjABSUGdveTlKjoH0Jg-pSmi6I9JHjW\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..aRSJJiF76SaxFCOgJdjpGGg7a88CxBViYm2ov1N0KXt5FM8meyhXWTpKQaBUA8Fw\"\
                    }}"
  /api/user/info/me:
    get:
      tags:
      - 사용자
      summary: 내 정보 조회
      description: "로그인한 사용자의 이메일, 닉네임 정보를 반환합니다."
      operationId: user-get-me
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                user-get-me:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"userEmail\"\
                    :\"owner@owner.com\",\"userNickname\":\"owner\"}}"
  /api/user/info/nickname:
    post:
      tags:
      - 사용자
      summary: 닉네임 변경
      description: 로그인한 사용자의 닉네임을 변경합니다.
      operationId: user-change-nickname
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-user-terms-33084672"
            examples:
              user-change-nickname:
                value: "{\"newNickname\":\"고동수\"}"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                user-change-nickname:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"userEmail\"\
                    :\"owner@owner.com\",\"userNickname\":\"고동수\"}}"
  /api/user/info/tester:
    get:
      tags:
      - 사용자
      summary: 닉네임으로 유저 검색
      description: 닉네임 키워드로 유저를 검색합니다. 동일 닉네임의 복수 결과가 반환될 수 있습니다.
      operationId: user-search-by-nickname
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                user-search-by-nickname:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":[{\"userId\":\"\
                    c482c7d6-9117-456e-865d-ab9b528cee33\",\"userEmail\":\"exist@test.com\"\
                    ,\"userNickname\":\"tester\"}]}"
  /api/user/terms/consent:
    post:
      tags:
      - 약관 동의
      summary: 전체 약관 일괄 동의
      description: |-
        PENDING 상태의 사용자가 약관에 동의합니다.
        **모든 필수(required=true) 약관에 동의 완료 시 사용자 상태가 PENDING → ACTIVE로 자동 전환됩니다.**
        전환 후 새로운 accessToken/refreshToken이 재발급되어 응답에 포함됩니다.
      operationId: terms-consent-all
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-user-terms-33084672"
            examples:
              terms-consent-all:
                value: "{\"consents\":[{\"termDefinitionId\":1,\"agreed\":true},{\"\
                  termDefinitionId\":2,\"agreed\":true},{\"termDefinitionId\":3,\"\
                  agreed\":true}]}"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                terms-consent-all:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..GeIOS3S6AOC8-5wxktyxmXcmlGbpf-X8NvLUA5e5ADSmTqvxvvSXqFdUbSvrzHY-\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..pMglukDR1czaGUmcWRFJpL9IIiH0UbExFtF59wlMA55FvY7bw4lFZ9awY-wzoLvm\"\
                    }}"
      security:
      - bearerAuthJWT: []
  /api/admin/users/{email}/block:
    post:
      tags:
      - 관리자 - 사용자
      summary: 유저 서비스 차단
      description: 특정 유저의 상태를 BLOCKED로 변경하여 서비스 이용을 차단합니다.
      operationId: admin-user-block
      parameters:
      - name: email
        in: path
        description: ""
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-user-terms-33084672"
            examples:
              admin-user-block:
                value: _csrf=AFluge9jF__OG0sYQEAN_SoBzV-vrvzjPqYTYlfc2NsuCjJoMT9Z5NxTJcbjLS16JW05yU4w4D2Xm87ODsIjADXpu-sXPABQ
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                admin-user-block:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
    delete:
      tags:
      - 관리자 - 사용자
      summary: 유저 차단 해제
      description: BLOCKED 상태의 유저를 ACTIVE로 복구합니다.
      operationId: admin-user-unblock
      parameters:
      - name: email
        in: path
        description: ""
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-user-terms-33084672"
            examples:
              admin-user-unblock:
                value: _csrf=p8QqtdoPh7-ZXSr57oJxskgZiFInfpowKJ9Mqm8F8guTdL7NlvQbhu1ptt20bB-aj69F1yx9pWsTGKgdTK0tk10wwmqqEdv8
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                admin-user-unblock:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/admin/users/{email}/token:
    delete:
      tags:
      - 관리자 - 사용자
      summary: 유저 강제 로그아웃
      description: Redis에서 해당 유저의 refreshToken을 삭제하여 강제 로그아웃시킵니다.
      operationId: admin-user-force-logout
      parameters:
      - name: email
        in: path
        description: ""
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-user-terms-33084672"
            examples:
              admin-user-force-logout:
                value: _csrf=ZTliKs62yE9rmL1YIAzRRr6hWMXGzEfKdOE6JWZZUF0CehuNAAxbHPeFq3hGqYo9FyHlJIvFdaSi9SPnRYdZQVM7Y2lkQy65
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                admin-user-force-logout:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/user/terms/version/{termsDefinitionId}:
    get:
      tags:
      - 약관
      summary: 약관 버전 상세 조회
      description: 특정 약관(termDefinitionId)의 현재 활성화된 버전 내용을 반환합니다.
      operationId: terms-version-detail
      parameters:
      - name: termsDefinitionId
        in: path
        description: ""
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                terms-version-detail:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"version\":\"\
                    v1.0\",\"content\":\"약관 내용\",\"effectiveDate\":\"2026-04-12T20:24:20.2520999\"\
                    }}"
components:
  schemas:
    api-user-terms-33084672:
      type: object
  securitySchemes:
    bearerAuthJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
