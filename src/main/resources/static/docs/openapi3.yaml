openapi: 3.0.1
info:
  title: ImHere API 문서
  description: User & Notification 통합 API 문서
  version: 0.0.1
servers:
- url: http://localhost:8080
tags: []
paths:
  /api/admin/friends:
    delete:
      tags:
      - 관리자 - 친구
      summary: 친구 관계 강제 삭제
      description: 두 유저 간의 친구 관계를 양방향 모두 강제 삭제합니다. CS 대응 목적으로 사용합니다.
      operationId: admin-friend-clear-relationship
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-user-terms-33084672"
            examples:
              admin-friend-clear-relationship:
                value: userA=adminA%40kakao.com&userB=adminB%40kakao.com&_csrf=haO59Dl3gGLOjwe9_aE-iQ9jwGPPgZ0Li2xZ7RPck09S2CXL5sWOkQtG41Tjvjffz4wKuDkG7QGrsK8m7l84iHG98XlkvByu
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                admin-friend-clear-relationship:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/user/terms:
    get:
      tags:
      - 약관
      summary: 약관 목록 조회
      description: 등록된 약관 종류(Definition) 목록을 페이징하여 반환합니다.
      operationId: terms-list
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                terms-list:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"content\":[{\"\
                    termDefinitionId\":4,\"title\":\"서비스 이용약관\",\"termsTypes\":\"\
                    SERVICE\",\"isRequired\":true},{\"termDefinitionId\":5,\"title\"\
                    :\"개인정보 처리방침\",\"termsTypes\":\"PRIVACY\",\"isRequired\":true}],\"\
                    empty\":false,\"first\":true,\"last\":true,\"number\":0,\"numberOfElements\"\
                    :2,\"pageable\":{\"offset\":0,\"pageNumber\":0,\"pageSize\":10,\"\
                    paged\":true,\"sort\":{\"empty\":true,\"sorted\":false,\"unsorted\"\
                    :true},\"unpaged\":false},\"size\":10,\"sort\":{\"empty\":true,\"\
                    sorted\":false,\"unsorted\":true},\"totalElements\":2,\"totalPages\"\
                    :1}}"
  /api/admin/friends/requests:
    delete:
      tags:
      - 관리자 - 친구
      summary: 친구 요청 강제 삭제
      description: requester → receiver 방향의 친구 요청을 강제 삭제합니다. CS 대응 목적으로 사용합니다.
      operationId: admin-friend-clear-request
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-user-terms-33084672"
            examples:
              admin-friend-clear-request:
                value: requester=req%40kakao.com&receiver=rcv%40kakao.com&_csrf=cDVgRUbjq3NePsnP1rTDB6Uo83y1W7TxMdlDiylSqU-OlQmbSQRUfX7bykNzCvGs4Jn3ZJxL3h2EbobcBut1sh03mHvtojuv
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                admin-friend-clear-request:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/admin/terms/definition:
    post:
      tags:
      - 관리자 - 약관
      summary: 약관 종류(Definition) 생성
      description: 새로운 약관 종류를 등록합니다. required=true이면 필수 동의 약관입니다.
      operationId: admin-terms-create-definition
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-user-terms-33084672"
            examples:
              admin-terms-create-definition:
                value: "{\"termsName\":\"위치 정보 이용 약관\",\"termsType\":\"LOCATION\"\
                  ,\"required\":true}"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                admin-terms-create-definition:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/admin/terms/version:
    post:
      tags:
      - 관리자 - 약관
      summary: 약관 버전 등록
      description: |-
        새로운 약관 버전을 등록합니다.
        기존 활성화된 버전은 자동으로 비활성화(isActive=false)되며, 새 버전이 활성 버전이 됩니다.
      operationId: admin-terms-create-version
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-user-terms-33084672"
            examples:
              admin-terms-create-version:
                value: "{\"termDefinitionId\":2,\"version\":\"v1.0\",\"content\":\"\
                  테스트 내용\",\"effectiveDate\":\"2026-04-12T18:56:20.6794419\"}"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                admin-terms-create-version:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/user/auth/login:
    post:
      tags:
      - 인증
      summary: 카카오 OAuth 로그인 / 기존 유저
      description: 기존 ACTIVE 유저 로그인. 200 OK와 함께 accessToken/refreshToken이 재발급됩니다.
      operationId: auth-login-
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-user-terms-33084672"
            examples:
              auth-login-existing:
                value: "{\"provider\":\"KAKAO\",\"idToken\":\"eyJ0eXAiOiJKV1QiLCJraWQiOiJ0ZXN0LWtpZCIsImFsZyI6IlJTMjU2In0..DaWbF0L4pZUPv8b3XRG7OH9GuAtNwDhrCjz9OruHle2W0QMMdlQScmZk6L36yOEZvquVXO7NNS4Q3l_-B8w-Ju0U2VHgVxKvYlWnxyNynGBvRb9I0Sv-njqnN0yxh3F4xroP1Xac4uQXRgRd-NdMKfb64N-Uf28veq7tV-Io-pl91n9kVpTTKupVB-WHtOP4DtUEKB2qOdK3sQDUuQyzA2zMpCNuE5ccXnqZftLH76Jfrex3i_3fXi3wZO-FSLhNtI6-YyO5ZSgJ3gm4aqcDjgTf1M5y6LFR8jU2hhxM-ckAc3usKZOdAkA2IGFe6tWzEzDM6X00H2ZcCq4t-4i8Ng\"\
                  }"
              auth-login-new:
                value: "{\"provider\":\"KAKAO\",\"idToken\":\"eyJ0eXAiOiJKV1QiLCJraWQiOiJ0ZXN0LWtpZCIsImFsZyI6IlJTMjU2In0..R8IcUvt9uHNwZYS5X5jLXYyN4DgabfPHe4moZs6Ie1_SSp9yF81lJfB5uXfibDq-7J7wxSwz9Hbz90U7QNL6o-9upgH658H0LjFJx_nj2JKTcLGqgwHzs7PPPt_ymKMKEiQX_iTq36tzxDRxLSH40e_Z8IUfchyFiVTYSrEmibnuLCmKt6XvCyUVEWoR6obRHFMn3SHGGf5WoybIWAZIM67QIRWni5BFBbULsQCiQMQnTRCPTr4mdpFcmM1yPQKsG39zWmwkTSxr5xw2mA1jPMow-srpz0kknK2QmCtEhvjsuVijATYz_b4isVxvjlr_9ItjdlQ1axK9ti-L3TF3gQ\"\
                  }"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                auth-login-existing:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..PVdsH-8Y3k-_181WI1KmqlRv1j1AQgntDmtGd_h-JVFmhBsiDth_pHFWtBHUYwvA\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..hyQHRjicvYbuaGZER3-XMIGmcy7LsFqyFvIIp1c5r3ULL93vKfx-c-DFSKKNciDt\"\
                    }}"
        "201":
          description: "201"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                auth-login-new:
                  value: "{\"code\":201,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..chmqEqsIbRz0O9fRJ36jNarT3cubWJvkTC2jaGewJ5at5vpa9VUDIhUNWcXcbDS-\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9.._zM_bChYh0n8moXLsc3yZOgRubl7RnEnCdN6dfXwBbn9rRhaeEjs1yWeC3_skuPA\"\
                    }}"
  /api/user/auth/reissue:
    post:
      tags:
      - 인증
      summary: JWT 토큰 재발급
      description: 유효한 refreshToken으로 accessToken/refreshToken을 재발급합니다.
      operationId: auth-reissue
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-user-terms-33084672"
            examples:
              auth-reissue:
                value: "{\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..EMwKNeV92Odysi_wdHZJzX8yQ0Rb4OOeQStONSE5nNlieHlV4qUlMwARj3ZIYfMT\"\
                  }"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                auth-reissue:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..baSu_x7wAQau7xv5gPDprChAh5QmCJsaSKZ6Lx0jwKv8d1vBq02boO-OZEqvlMeL\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..yY5zS3layvlYMAjAw2mOyIQux-f9gg9ZJdRmXvLBh0K8KK0isGG2hucyHR280YzD\"\
                    }}"
  /api/user/info/me:
    get:
      tags:
      - 사용자
      summary: 내 정보 조회
      description: "로그인한 사용자의 이메일, 닉네임 정보를 반환합니다."
      operationId: user-get-me
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                user-get-me:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"userEmail\"\
                    :\"owner@owner.com\",\"userNickname\":\"owner\"}}"
  /api/user/info/nickname:
    post:
      tags:
      - 사용자
      summary: 닉네임 변경
      description: 로그인한 사용자의 닉네임을 변경합니다.
      operationId: user-change-nickname
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-user-terms-33084672"
            examples:
              user-change-nickname:
                value: "{\"newNickname\":\"고동수\"}"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                user-change-nickname:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"userEmail\"\
                    :\"owner@owner.com\",\"userNickname\":\"고동수\"}}"
  /api/user/info/tester:
    get:
      tags:
      - 사용자
      summary: 닉네임으로 유저 검색
      description: 닉네임 키워드로 유저를 검색합니다. 동일 닉네임의 복수 결과가 반환될 수 있습니다.
      operationId: user-search-by-nickname
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                user-search-by-nickname:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":[{\"userId\":\"\
                    95dca02f-f752-45fb-93ea-ea2c487041ef\",\"userEmail\":\"exist@test.com\"\
                    ,\"userNickname\":\"tester\"}]}"
  /api/user/terms/consent:
    post:
      tags:
      - 약관 동의
      summary: 전체 약관 일괄 동의
      description: |-
        PENDING 상태의 사용자가 약관에 동의합니다.
        **모든 필수(required=true) 약관에 동의 완료 시 사용자 상태가 PENDING → ACTIVE로 자동 전환됩니다.**
        전환 후 새로운 accessToken/refreshToken이 재발급되어 응답에 포함됩니다.
      operationId: terms-consent-all
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-user-terms-33084672"
            examples:
              terms-consent-all:
                value: "{\"consents\":[{\"termDefinitionId\":1,\"agreed\":true},{\"\
                  termDefinitionId\":2,\"agreed\":true},{\"termDefinitionId\":3,\"\
                  agreed\":true}]}"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                terms-consent-all:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..NsbJYpQ8_rW6kOi9PFcmqKKVrA8il3LsGOo04FXPD9PA3_7NMVKpwL5t0mLQpf1n\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..n2OhPHn0_G4mkjhMUsQr6-9PMtAgmVuxYq0zCIErWJEdDqEMBFl_QzXJGGhB0hZ6\"\
                    }}"
      security:
      - bearerAuthJWT: []
  /api/admin/users/{email}/block:
    post:
      tags:
      - 관리자 - 사용자
      summary: 유저 서비스 차단
      description: 특정 유저의 상태를 BLOCKED로 변경하여 서비스 이용을 차단합니다.
      operationId: admin-user-block
      parameters:
      - name: email
        in: path
        description: ""
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-user-terms-33084672"
            examples:
              admin-user-block:
                value: _csrf=5dkFOso6Q4YeoxIvYLLGt0TC_Os_zfbLGuRSv-dYu9MWdfK2hL01A_sIJuIzxyNNA5_y0SX20dNcqMfmLII029E9juUiQsOP
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                admin-user-block:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
    delete:
      tags:
      - 관리자 - 사용자
      summary: 유저 차단 해제
      description: BLOCKED 상태의 유저를 ACTIVE로 복구합니다.
      operationId: admin-user-unblock
      parameters:
      - name: email
        in: path
        description: ""
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-user-terms-33084672"
            examples:
              admin-user-unblock:
                value: _csrf=jxObN9r9Nasieg1Ymk_PZjugF9qoAaz9Hl9rxK0nYKYi19Y-viT5AOiZVJgPQj45-2L7UlmYOuLKYpXQKGgIoJQXUJ4a4bUL
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                admin-user-unblock:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/admin/users/{email}/token:
    delete:
      tags:
      - 관리자 - 사용자
      summary: 유저 강제 로그아웃
      description: Redis에서 해당 유저의 refreshToken을 삭제하여 강제 로그아웃시킵니다.
      operationId: admin-user-force-logout
      parameters:
      - name: email
        in: path
        description: ""
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-user-terms-33084672"
            examples:
              admin-user-force-logout:
                value: _csrf=H-0YBOyMAveNB5rayHphv7kwBoBBmsVxHND2pwczBBnufI6UKo8sM9q6NZGgNau4_1dViYgIK-Fy_vxcLeWXnjICYH3eGrvy
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                admin-user-force-logout:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/user/terms/version/{termsDefinitionId}:
    get:
      tags:
      - 약관
      summary: 약관 버전 상세 조회
      description: 특정 약관(termDefinitionId)의 현재 활성화된 버전 내용을 반환합니다.
      operationId: terms-version-detail
      parameters:
      - name: termsDefinitionId
        in: path
        description: ""
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-terms-33084672"
              examples:
                terms-version-detail:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"version\":\"\
                    v1.0\",\"content\":\"약관 내용\",\"effectiveDate\":\"2026-04-11T18:56:20.7870531\"\
                    }}"
components:
  schemas:
    api-user-terms-33084672:
      type: object
  securitySchemes:
    bearerAuthJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
