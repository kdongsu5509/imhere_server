openapi: 3.0.1
info:
  title: ImHere API 문서
  description: User & Notification 통합 API 문서
  version: 0.0.1
servers:
- url: http://localhost:8080
tags: []
paths:
  /api/admin/friends:
    delete:
      tags:
      - 관리자 - 친구
      summary: 친구 관계 강제 삭제
      description: 두 유저 간의 친구 관계를 양방향 모두 강제 삭제합니다. CS 대응 목적으로 사용합니다.
      operationId: admin-friend-clear-relationship
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              admin-friend-clear-relationship:
                value: userA=adminA%40kakao.com&userB=adminB%40kakao.com&_csrf=NQwz5FF57R_m6ttHGwVszr5U-lUJN904yv_aOq0G30MwCr6EADgKhWBM2SjL2OJwfyhY_o82121sVesV-Zq-Apo_5iJVO4i0
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                admin-friend-clear-relationship:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/notification/fcmToken:
    post:
      tags:
      - 알림 - FCM 등록
      summary: FCM 토큰 서버 저장용 api
      description: FCM토큰을 서버에서 사용할 수 있도록 저장 시 사용
      operationId: fcm-enroll/success_
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              fcm-enroll/success_aos:
                value: "{\"fcmToken\":\"valid-fcm-token\",\"deviceType\":\"AOS\"}"
              fcm-enroll/success_ios:
                value: "{\"fcmToken\":\"valid-ios-fcm-token\",\"deviceType\":\"IOS\"\
                  }"
      responses:
        "200":
          description: "200"
  /api/user/friends:
    get:
      tags:
      - 친구
      summary: 내 친구 목록 조회
      description: 로그인한 사용자의 친구 관계(친구 별명 포함) 목록을 반환합니다.
      operationId: friends-list
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                friends-list:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":[{\"friendRelationshipId\"\
                    :\"a757f611-fca1-49bb-a4bf-7e6eeb21f415\",\"friendEmail\":\"friend@test.com\"\
                    ,\"friendAlias\":\"베프\"}]}"
  /api/user/terms:
    get:
      tags:
      - 약관
      summary: 약관 목록 조회
      description: 등록된 약관 종류(Definition) 목록을 페이징하여 반환합니다.
      operationId: terms-list
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                terms-list:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"content\":[{\"\
                    termDefinitionId\":4,\"title\":\"서비스 이용약관\",\"termsTypes\":\"\
                    SERVICE\",\"isRequired\":true},{\"termDefinitionId\":5,\"title\"\
                    :\"개인정보 처리방침\",\"termsTypes\":\"PRIVACY\",\"isRequired\":true}],\"\
                    empty\":false,\"first\":true,\"last\":true,\"number\":0,\"numberOfElements\"\
                    :2,\"pageable\":{\"offset\":0,\"pageNumber\":0,\"pageSize\":10,\"\
                    paged\":true,\"sort\":{\"empty\":true,\"sorted\":false,\"unsorted\"\
                    :true},\"unpaged\":false},\"size\":10,\"sort\":{\"empty\":true,\"\
                    sorted\":false,\"unsorted\":true},\"totalElements\":2,\"totalPages\"\
                    :1}}"
  /api/admin/friends/requests:
    delete:
      tags:
      - 관리자 - 친구
      summary: 친구 요청 강제 삭제
      description: requester → receiver 방향의 친구 요청을 강제 삭제합니다. CS 대응 목적으로 사용합니다.
      operationId: admin-friend-clear-request
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              admin-friend-clear-request:
                value: requester=req%40kakao.com&receiver=rcv%40kakao.com&_csrf=HHPo8Pv-xCptZd-uXBgYbnIFqqESATT8b0TLS6roX3Wy_mDleBWMkcPO_U9AUbyfazUsD0M9h5h0NFfRXXb9KciMPhODyVLT
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                admin-friend-clear-request:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/admin/rabbitmq/dlq:
    get:
      tags:
      - 관리자 - DLQ
      summary: 전체 DLQ 목록 조회
      description: 모든 Dead Letter Queue의 이름과 메시지 수를 반환합니다.
      operationId: admin-dlq-list
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                admin-dlq-list:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":[{\"queueName\"\
                    :\"noti.queue.friend.dlq\",\"messageCount\":3,\"consumerCount\"\
                    :0},{\"queueName\":\"noti.queue.service.dlq\",\"messageCount\"\
                    :1,\"consumerCount\":0}]}"
  /api/admin/terms/definition:
    post:
      tags:
      - 관리자 - 약관
      summary: 약관 종류(Definition) 생성
      description: 새로운 약관 종류를 등록합니다. required=true이면 필수 동의 약관입니다.
      operationId: admin-terms-create-definition
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              admin-terms-create-definition:
                value: "{\"termsName\":\"위치 정보 이용 약관\",\"termsType\":\"LOCATION\"\
                  ,\"required\":true}"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                admin-terms-create-definition:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/admin/terms/version:
    post:
      tags:
      - 관리자 - 약관
      summary: 약관 버전 등록
      description: |-
        새로운 약관 버전을 등록합니다.
        기존 활성화된 버전은 자동으로 비활성화(isActive=false)되며, 새 버전이 활성 버전이 됩니다.
      operationId: admin-terms-create-version
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              admin-terms-create-version:
                value: "{\"termDefinitionId\":2,\"version\":\"v1.0\",\"content\":\"\
                  테스트 내용\",\"effectiveDate\":\"2026-04-28T13:33:02.8483415\"}"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                admin-terms-create-version:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/notification/fcm/arrival:
    post:
      tags:
      - 알림 - 도착
      summary: 도착 알림 FCM 발송
      description: 목적지 도착 알림을 FCM을 통해 특정 상대방에게 전달합니다.
      operationId: arrival-notification/
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              arrival-notification/blank-body:
                value: "{\"receiverEmail\":\"receiver@example.com\",\"type\":\"ANY_TYPE\"\
                  ,\"body\":\"\"}"
              arrival-notification/invalid-email:
                value: "{\"receiverEmail\":\"not-an-email\",\"type\":\"ANY_TYPE\"\
                  ,\"body\":\"도착했습니다.\"}"
              arrival-notification/success:
                value: "{\"receiverEmail\":\"receiver@example.com\",\"type\":\"ANY_TYPE\"\
                  ,\"body\":\"목적지에 도착했습니다.\"}"
          application/json:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              arrival-notification/without-auth-request:
                value: "{\"receiverEmail\":\"receiver@example.com\",\"type\":\"ANY_TYPE\"\
                  ,\"body\":\"도착했습니다.\"}"
      responses:
        "400":
          description: "400"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                arrival-notification/blank-body:
                  value: "{\"code\":400,\"message\":\"BAD_REQUEST\",\"data\":{\"code\"\
                    :\"INVALID_INPUT_VALUE\",\"message\":\"요청 값에 오류가 있습니다\"}}"
                arrival-notification/invalid-email:
                  value: "{\"code\":400,\"message\":\"BAD_REQUEST\",\"data\":{\"code\"\
                    :\"INVALID_INPUT_VALUE\",\"message\":\"요청 값에 오류가 있습니다\"}}"
        "200":
          description: "200"
        "401":
          description: "401"
  /api/notification/fcm/delivery-result:
    post:
      tags:
      - 알림 - 정상 발송
      summary: 알림 정상 발송 전송 api
      description: 목적지 도착 알림을 정상적으로 발송한 경우 스스로에게 FCM을 통해 해당 내용을 전달
      operationId: delivery-result/
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              delivery-result/empty-body:
                value: "{\"receiverEmail\":\"receiver@example.com\",\"type\":\"ANY_TYPE\"\
                  ,\"body\":\"\"}"
              delivery-result/success:
                value: "{\"receiverEmail\":\"any-receiver@example.com\",\"type\":\"\
                  DELIVERY_RESULT_NOTICE\",\"body\":\"요청하신 알림이 성공적으로 전송되었습니다.\"}"
          application/json:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              delivery-result/without-auth:
                value: "{\"receiverEmail\":\"any@example.com\",\"type\":\"ANY_TYPE\"\
                  ,\"body\":\"test\"}"
      responses:
        "400":
          description: "400"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                delivery-result/empty-body:
                  value: "{\"code\":400,\"message\":\"BAD_REQUEST\",\"data\":{\"code\"\
                    :\"INVALID_INPUT_VALUE\",\"message\":\"요청 값에 오류가 있습니다\"}}"
        "200":
          description: "200"
        "401":
          description: "401"
  /api/notification/fcm/location:
    post:
      tags:
      - 알림 - 위치 수신 대상자 알림
      summary: 위치 수신 대상자 선정 알람 api
      description: 앱을 사용하는 사람에게 알람 발송 설정 시 알람 발송
      operationId: target-notification/success
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              target-notification/success:
                value: "{\"receiverEmail\":\"receiver@example.com\",\"type\":\"ANY_TYPE\"\
                  ,\"body\":\"위치 알림 대상자로 등록되었습니다.\"}"
      responses:
        "200":
          description: "200"
  /api/notification/fcm/send:
    post:
      tags:
      - 알림 - FCM 발송
      summary: 알림 FCM 발송 api
      description: 목적지 도착 알림 FCM으로 발송
      operationId: fcm-notification/
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              fcm-notification/empty-body:
                value: "{\"receiverEmail\":\"receiver@example.com\",\"type\":\"FRIEND_REQUEST\"\
                  ,\"body\":\"\"}"
              fcm-notification/empty-email:
                value: "{\"receiverEmail\":\"\",\"type\":\"FRIEND_REQUEST\",\"body\"\
                  :\"test\"}"
              fcm-notification/invalid-email:
                value: "{\"receiverEmail\":\"not-an-email\",\"type\":\"FRIEND_REQUEST\"\
                  ,\"body\":\"test\"}"
              fcm-notification/success:
                value: "{\"receiverEmail\":\"receiver@example.com\",\"type\":\"FRIEND_REQUEST\"\
                  ,\"body\":\"친구 요청이 왔습니다.\"}"
          application/json:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              fcm-notification/without-auth:
                value: "{\"receiverEmail\":\"receiver@example.com\",\"type\":\"FRIEND_REQUEST\"\
                  ,\"body\":\"test\"}"
      responses:
        "400":
          description: "400"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                fcm-notification/empty-body:
                  value: "{\"code\":400,\"message\":\"BAD_REQUEST\",\"data\":{\"code\"\
                    :\"INVALID_INPUT_VALUE\",\"message\":\"요청 값에 오류가 있습니다\"}}"
                fcm-notification/empty-email:
                  value: "{\"code\":400,\"message\":\"BAD_REQUEST\",\"data\":{\"code\"\
                    :\"INVALID_INPUT_VALUE\",\"message\":\"요청 값에 오류가 있습니다\"}}"
                fcm-notification/invalid-email:
                  value: "{\"code\":400,\"message\":\"BAD_REQUEST\",\"data\":{\"code\"\
                    :\"INVALID_INPUT_VALUE\",\"message\":\"요청 값에 오류가 있습니다\"}}"
        "200":
          description: "200"
        "401":
          description: "401"
  /api/notification/sms/send:
    post:
      tags:
      - 알림 - 문자 알림
      summary: 문자를 통한 알람 발송용 api
      description: 앱을 사용하지 않는 사람에게 SMS로 알람 발송
      operationId: single-sms/success
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              single-sms/success:
                value: "{\"receiverNumber\":\"01012345678\",\"location\":\"판교역\"}"
      responses:
        "200":
          description: "200"
  /api/user/auth/login:
    post:
      tags:
      - 인증
      summary: 카카오 OAuth 로그인 / 기존 유저
      description: 기존 ACTIVE 유저 로그인. 200 OK와 함께 accessToken/refreshToken이 재발급됩니다.
      operationId: auth-login-
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              auth-login-existing:
                value: "{\"provider\":\"KAKAO\",\"idToken\":\"eyJ0eXAiOiJKV1QiLCJraWQiOiJ0ZXN0LWtpZCIsImFsZyI6IlJTMjU2In0..pq6XS6z3B9Ku2j3T8Jdbth3ID1zr1xQ0U6HDs63RRzUlTsKQnpwFaPsi52IooI3bC7YkL1pN1Fta9o7B-sk5ZBn68zigegGFK7WZCP4y85yQLYGY_m0yNXCv5e6ZExHSdw1ploagSqkmYYZ5jiD9sWSSi_zM5U286U6G8F-KTzpqHQN3ChB2r6qgCnXTtApXdgUckYaylRmqOM-q-meJCYVTOFDcILVVYF5v1BK2MruOf03c_qZgvhxhPh_MtsOcuNXPOBEwN8zh6Fg96UUZkPSzo41tiC6z_G74covz44g5P4h6KEbOFgWSdVW1ZZ3dgXp-KL3AzJGiD89XUeKWow\"\
                  }"
              auth-login-new:
                value: "{\"provider\":\"KAKAO\",\"idToken\":\"eyJ0eXAiOiJKV1QiLCJraWQiOiJ0ZXN0LWtpZCIsImFsZyI6IlJTMjU2In0..jI1QY8gPKXG9tlT1ZQRKl9wy8m0RaopOP2Szny1WnsJKm8aiX3XEcHVpmu8qF4O3Suldyvv9JOQzqwxwdFR5bB_F1O3ypL7NJX10PGcgvkHeaK4dtxAlHvsISm1eKeBn3ny8m-PljFiG_lmdBqKHqyxKAc4VNATBmIWBBTrHpbyYBzIMIZ9UQMVXUiMj75_BLVgodaupfkcPejFfw1dRlL3LBYguWWIKf4loo3UQv2WgPF06hFLNjR0NMrLagZO6Hjp2rA9HwnmMGD_BjrYX2flv3ks75jYTji0n-2ikY8X3QeuhD1tQ4mhKwa5fC5H133yvgIYB7PLL2Ym5nQH3gw\"\
                  }"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                auth-login-existing:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..w-i7sQZMP-xBrWCEUvNmaQeQCQ0aFc-wCOP48lbQNWMcxV6AzgYmrhPl-VE74g3W\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..qgVrFpsAkf1tQq4kZciIkbC_fblgtdp-8LNVcKavlDxbUVOoQaJv-h2uCNl7KB3G\"\
                    }}"
        "201":
          description: "201"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                auth-login-new:
                  value: "{\"code\":201,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..J6SJeI-CHO2BlWIUlCOGJTQlEg988tBUoo_CTWRgBJ3BF7XSCl_VUNG9Ha272ATi\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..0zOhcEBZFw13cl82jUR_kHB94zthToO9-0nuWhpc-QfIS4h-XQhRQFbejbOf-t-F\"\
                    }}"
  /api/user/auth/reissue:
    post:
      tags:
      - 인증
      summary: JWT 토큰 재발급
      description: 유효한 refreshToken으로 accessToken/refreshToken을 재발급합니다.
      operationId: auth-reissue
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              auth-reissue:
                value: "{\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..KBOxtMKJpcuV6srwOopsEjPy1xfAnqEB8eEV3T14XpWtmIreh2KEaLtKGEEMH8DW\"\
                  }"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                auth-reissue:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..AYqw3urc8WLkb7GSl_Dr0jBQYKLLHUHioPEQqA0OhLmkFEtV44f_T6ZGeb92skjl\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..2CLdR2DytwZdu4U6xZA9nOKNx5VSANZ4bDOzMoaaYANikIKG5mChHF4zyem0l4W4\"\
                    }}"
  /api/user/friends/alias:
    post:
      tags:
      - 친구
      summary: 친구 별명 변경
      description: 요청자의 지정 `friendRelationshipId`에 대한 친구 별명(`friendAlias`)을 업데이트합니다.
      operationId: friends-alias-update
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              friends-alias-update:
                value: "{\"friendRelationshipId\":\"f3962eaa-9680-4539-80e3-7395b6f295b4\"\
