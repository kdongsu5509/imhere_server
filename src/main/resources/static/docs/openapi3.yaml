openapi: 3.0.1
info:
  title: ImHere API 문서
  description: User & Notification 통합 API 문서
  version: 0.0.1
servers:
- url: http://localhost:8080
tags: []
paths:
  /api/admin/friends:
    delete:
      tags:
      - 관리자 - 친구
      summary: 친구 관계 강제 삭제
      description: 두 유저 간의 친구 관계를 양방향 모두 강제 삭제합니다. CS 대응 목적으로 사용합니다.
      operationId: admin-friend-clear-relationship
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-user-auth-reissue-33084672"
            examples:
              admin-friend-clear-relationship:
                value: userA=adminA%40kakao.com&userB=adminB%40kakao.com&_csrf=5PGIhUpbio7DjxIzjFXfgPxjzFpk7-ThjfRGOV6uBHx3mBB7gsbu5nNiurnu7ncKv3jr489a4TgBjofMvM0gD2jLMR5ArSRJ
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-auth-reissue-33084672"
              examples:
                admin-friend-clear-relationship:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/user/terms:
    get:
      tags:
      - 약관
      summary: 약관 목록 조회
      description: 등록된 약관 종류(Definition) 목록을 페이징하여 반환합니다.
      operationId: terms-list
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-auth-reissue-33084672"
              examples:
                terms-list:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"content\":[{\"\
                    termDefinitionId\":4,\"title\":\"서비스 이용약관\",\"termsTypes\":\"\
                    SERVICE\",\"isRequired\":true},{\"termDefinitionId\":5,\"title\"\
                    :\"개인정보 처리방침\",\"termsTypes\":\"PRIVACY\",\"isRequired\":true}],\"\
                    empty\":false,\"first\":true,\"last\":true,\"number\":0,\"numberOfElements\"\
                    :2,\"pageable\":{\"offset\":0,\"pageNumber\":0,\"pageSize\":10,\"\
                    paged\":true,\"sort\":{\"empty\":true,\"sorted\":false,\"unsorted\"\
                    :true},\"unpaged\":false},\"size\":10,\"sort\":{\"empty\":true,\"\
                    sorted\":false,\"unsorted\":true},\"totalElements\":2,\"totalPages\"\
                    :1}}"
  /api/admin/friends/requests:
    delete:
      tags:
      - 관리자 - 친구
      summary: 친구 요청 강제 삭제
      description: requester → receiver 방향의 친구 요청을 강제 삭제합니다. CS 대응 목적으로 사용합니다.
      operationId: admin-friend-clear-request
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-user-auth-reissue-33084672"
            examples:
              admin-friend-clear-request:
                value: requester=req%40kakao.com&receiver=rcv%40kakao.com&_csrf=_z3l7hLb7UXlXwbvh8006RKa1217WN7pwekl6Jh36aTDYlnHzArSiiTq2yHIbTCMvuAA33es-g8daunE94oR0axP2JHzBmjx
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-auth-reissue-33084672"
              examples:
                admin-friend-clear-request:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/admin/terms/definition:
    post:
      tags:
      - 관리자 - 약관
      summary: 약관 종류(Definition) 생성
      description: 새로운 약관 종류를 등록합니다. required=true이면 필수 동의 약관입니다.
      operationId: admin-terms-create-definition
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-user-auth-reissue-33084672"
            examples:
              admin-terms-create-definition:
                value: "{\"termsName\":\"위치 정보 이용 약관\",\"termsType\":\"LOCATION\"\
                  ,\"required\":true}"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-auth-reissue-33084672"
              examples:
                admin-terms-create-definition:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/admin/terms/version:
    post:
      tags:
      - 관리자 - 약관
      summary: 약관 버전 등록
      description: |-
        새로운 약관 버전을 등록합니다.
        기존 활성화된 버전은 자동으로 비활성화(isActive=false)되며, 새 버전이 활성 버전이 됩니다.
      operationId: admin-terms-create-version
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-user-auth-reissue-33084672"
            examples:
              admin-terms-create-version:
                value: "{\"termDefinitionId\":2,\"version\":\"v1.0\",\"content\":\"\
                  테스트 내용\",\"effectiveDate\":\"2026-04-13T19:44:20.4515633\"}"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-auth-reissue-33084672"
              examples:
                admin-terms-create-version:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/user/auth/login:
    post:
      tags:
      - 인증
      summary: 카카오 OAuth 로그인 / 기존 유저
      description: 기존 ACTIVE 유저 로그인. 200 OK와 함께 accessToken/refreshToken이 재발급됩니다.
      operationId: auth-login-
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-user-auth-reissue-33084672"
            examples:
              auth-login-existing:
                value: "{\"provider\":\"KAKAO\",\"idToken\":\"eyJ0eXAiOiJKV1QiLCJraWQiOiJ0ZXN0LWtpZCIsImFsZyI6IlJTMjU2In0..j8G7uEeUhOf7GYWdRoE47KbmJAsdTpHHoeg3z4T62OjaRJ81uhwsaKgnkwn5RMbAzQ0vUnkNKGgnDQC2O9JzBL-dnH1sJHZl3Jbc2XYQ6sfioqCf1GXCa9aj4L23b-fLo49RQTRPcBnq71mEZ2b0XL8sBpGzzArgT8EkHLku6quuQD7bU1Sv8Z8FpGupIvWi1JurK4_bIjR30pc0Xb3e6nz-Hs1himB2KKImhOUmEPrfJerZKPg7a58TCU1dZqSpKbjRk-uycNPhUHadMT0WOze8BtzsXg71eB56Ii8LjQt-oW4if1TXY4YR5thd16izwF82YHib6IVnjm5fSxZWpA\"\
                  }"
              auth-login-new:
                value: "{\"provider\":\"KAKAO\",\"idToken\":\"eyJ0eXAiOiJKV1QiLCJraWQiOiJ0ZXN0LWtpZCIsImFsZyI6IlJTMjU2In0..nv1HEQmgWSyrMzcVDjwICC5F6-_lskxOXhF6ptQBFjfu4llF4se9fr8oRtoEils1csfFO-VZM4LMtaYhBq627tzLWPyLfWecSmC0axIMaMLowMPFqX9x05us42R5oZPbmiWlw0xySGd8cSeR7PLafIfZbqFKSK5T7RRzuHHH6oiYWYC6Ye2mkpoND3YXawmC5UrzkLEBKcsS0PyTrTyLd0x9ev7Cr9ZztCk92K-pb1_W8fe75KiUgR-4ljZyH-uHXEJ3GCbn441yryohyfZJcKg4IiuqhGbhwSrq7Ued0cMcHGN02xryPxR7whg_HkpHw0oylMk42oCYr21zu_PQ8w\"\
                  }"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-auth-reissue-33084672"
              examples:
                auth-login-existing:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..AziTFlRMrB7dRUB3XmYN6xinblVEDBQKBEMvDzvjxB_uY7Cbg7CjPlyLSf9s2xYL\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..dVA2ikiKGwYXaTNzXKl5AxVEMSnvLoty8jzLGLR13MqoJu5CCvnPqYpZisLHnAGH\"\
                    }}"
        "201":
          description: "201"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-auth-reissue-33084672"
              examples:
                auth-login-new:
                  value: "{\"code\":201,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..XjIJG-L1cnk29JLInKSHiISBOX9gAeVfqou_r80m5YpDITzcBSxzH5kLndEzoMdV\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..iD6VJdmlNBRf0vAMew4AvDlwfVjktIWTTPOTVVHXjzerLL8EKBCF5L8sLQswpSUt\"\
                    }}"
  /api/user/auth/reissue:
    post:
      tags:
      - 인증
      summary: JWT 토큰 재발급
      description: 유효한 refreshToken으로 accessToken/refreshToken을 재발급합니다.
      operationId: auth-reissue
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-user-auth-reissue-33084672"
            examples:
              auth-reissue:
                value: "{\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..jqY2qg0dtSQOC0vEQOVFIeJleFaMf8rpwjVGLS8cTZZOGfy3iOisNA6imUkDX9fv\"\
                  }"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-auth-reissue-33084672"
              examples:
                auth-reissue:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..wkNWjxOaUx_9kbc4qeMpCYU_cOkVTNo-yH11PTKqkaUmUa3WU1Pz0by76kiBFQQO\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..4RAqckIuTT-H0-2trogQtk9WLHdhTyEKa8jT4lD93JyzXt5pHpxv6ruP2CeYOrz2\"\
                    }}"
  /api/user/info/me:
    get:
      tags:
      - 사용자
      summary: 내 정보 조회
      description: "로그인한 사용자의 이메일, 닉네임 정보를 반환합니다."
      operationId: user-get-me
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-auth-reissue-33084672"
              examples:
                user-get-me:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"userEmail\"\
                    :\"owner@owner.com\",\"userNickname\":\"owner\"}}"
  /api/user/info/nickname:
    post:
      tags:
      - 사용자
      summary: 닉네임 변경
      description: 로그인한 사용자의 닉네임을 변경합니다.
      operationId: user-change-nickname
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-user-auth-reissue-33084672"
            examples:
              user-change-nickname:
                value: "{\"newNickname\":\"고동수\"}"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-auth-reissue-33084672"
              examples:
                user-change-nickname:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"userEmail\"\
                    :\"owner@owner.com\",\"userNickname\":\"고동수\"}}"
  /api/user/info/tester:
    get:
      tags:
      - 사용자
      summary: 닉네임으로 유저 검색
      description: 닉네임 키워드로 유저를 검색합니다. 동일 닉네임의 복수 결과가 반환될 수 있습니다.
      operationId: user-search-by-nickname
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-auth-reissue-33084672"
              examples:
                user-search-by-nickname:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":[{\"userId\":\"\
                    79be2003-d22a-460d-88f1-0fa8d9e0e85b\",\"userEmail\":\"exist@test.com\"\
                    ,\"userNickname\":\"tester\"}]}"
  /api/user/terms/consent:
    post:
      tags:
      - 약관 동의
      summary: 전체 약관 일괄 동의
      description: |-
        PENDING 상태의 사용자가 약관에 동의합니다.
        **모든 필수(required=true) 약관에 동의 완료 시 사용자 상태가 PENDING → ACTIVE로 자동 전환됩니다.**
        전환 후 새로운 accessToken/refreshToken이 재발급되어 응답에 포함됩니다.
      operationId: terms-consent-all
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-user-auth-reissue-33084672"
            examples:
              terms-consent-all:
                value: "{\"consents\":[{\"termDefinitionId\":1,\"agreed\":true},{\"\
                  termDefinitionId\":2,\"agreed\":true},{\"termDefinitionId\":3,\"\
                  agreed\":true}]}"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-auth-reissue-33084672"
              examples:
                terms-consent-all:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..lJ8RlvzuKpuMa6yxITQ5HwxdcoPlKjBtE5WpCzOhJGdYI9p49pBth29eIy_UXGk9\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..CEup6F_HUpaEc0y-m6TxeS_9vAIi5SdYaCyMvfJIk0IjEK4cC8kfIrEt9-ZsXkGE\"\
                    }}"
      security:
      - bearerAuthJWT: []
  /api/admin/users/{email}/block:
    post:
      tags:
      - 관리자 - 사용자
      summary: 유저 서비스 차단
      description: 특정 유저의 상태를 BLOCKED로 변경하여 서비스 이용을 차단합니다.
      operationId: admin-user-block
      parameters:
      - name: email
        in: path
        description: ""
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-user-auth-reissue-33084672"
            examples:
              admin-user-block:
                value: _csrf=xf8Z9xqn4aZfCsLFLOzLbxSHB5Ridiv7Ey1fRy8bk5bsIgyX9cl8zi-Q2ZdyO_ekSsH_CyHkKvUGQ0jWJRpscksj8fXbQTSu
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-auth-reissue-33084672"
              examples:
                admin-user-block:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
    delete:
      tags:
      - 관리자 - 사용자
      summary: 유저 차단 해제
      description: BLOCKED 상태의 유저를 ACTIVE로 복구합니다.
      operationId: admin-user-unblock
      parameters:
      - name: email
        in: path
        description: ""
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-user-auth-reissue-33084672"
            examples:
              admin-user-unblock:
                value: _csrf=wddfah2_uWn1eevFWl4XIv0oYUJygVl8HgQVl-ZOXYSuPlAy9-87WCzbiV_YS92gbXMjE8kZTCNAtmlRezd2r4J6auWYXzFQ
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-auth-reissue-33084672"
              examples:
                admin-user-unblock:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/admin/users/{email}/token:
    delete:
      tags:
      - 관리자 - 사용자
      summary: 유저 강제 로그아웃
      description: Redis에서 해당 유저의 refreshToken을 삭제하여 강제 로그아웃시킵니다.
      operationId: admin-user-force-logout
      parameters:
      - name: email
        in: path
        description: ""
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-user-auth-reissue-33084672"
            examples:
              admin-user-force-logout:
                value: _csrf=gtkaXGUSIMZF_AmlXn9na7yOgvo0Fbs3_6L1kCIboZ6IhzDq47gqPwNzQqVozTmcZlJTU9m2r8IDLIIazJfGpBAvmK28sgCI
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-auth-reissue-33084672"
              examples:
                admin-user-force-logout:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/user/terms/version/{termsDefinitionId}:
    get:
      tags:
      - 약관
      summary: 약관 버전 상세 조회
      description: 특정 약관(termDefinitionId)의 현재 활성화된 버전 내용을 반환합니다.
      operationId: terms-version-detail
      parameters:
      - name: termsDefinitionId
        in: path
        description: ""
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-user-auth-reissue-33084672"
              examples:
                terms-version-detail:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"version\":\"\
                    v1.0\",\"content\":\"약관 내용\",\"effectiveDate\":\"2026-04-12T19:44:20.5461545\"\
                    }}"
components:
  schemas:
    api-user-auth-reissue-33084672:
      type: object
  securitySchemes:
    bearerAuthJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
