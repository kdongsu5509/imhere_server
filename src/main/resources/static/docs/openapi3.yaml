openapi: 3.0.1
info:
  title: ImHere API 문서
  description: User & Notification 통합 API 문서
  version: 0.0.1
servers:
- url: http://localhost:8080
tags: []
paths:
  /api/admin/friends:
    delete:
      tags:
      - 관리자 - 친구
      summary: 친구 관계 강제 삭제
      description: 두 유저 간의 친구 관계를 양방향 모두 강제 삭제합니다. CS 대응 목적으로 사용합니다.
      operationId: admin-friend-clear-relationship
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              admin-friend-clear-relationship:
                value: userA=adminA%40kakao.com&userB=adminB%40kakao.com&_csrf=CNyKZNk7w1OXLFCr69p265iTMMJPqUthb-aj-if0_PkjmAl7P7jpB7gP8zW6FGCd3fdC2vrxHfp_nChMCtOWzUSXxc5A_DlP
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                admin-friend-clear-relationship:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/notification/fcmToken:
    post:
      tags:
      - 알림 - FCM 등록
      summary: FCM 토큰 서버 저장용 api
      description: FCM토큰을 서버에서 사용할 수 있도록 저장 시 사용
      operationId: fcm-enroll/success_
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              fcm-enroll/success_aos:
                value: "{\"fcmToken\":\"valid-fcm-token\",\"deviceType\":\"AOS\"}"
              fcm-enroll/success_ios:
                value: "{\"fcmToken\":\"valid-ios-fcm-token\",\"deviceType\":\"IOS\"\
                  }"
      responses:
        "200":
          description: "200"
  /api/user/friends:
    get:
      tags:
      - 친구
      summary: 내 친구 목록 조회
      description: 로그인한 사용자의 친구 관계(친구 별명 포함) 목록을 반환합니다.
      operationId: friends-list
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                friends-list:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":[{\"friendRelationshipId\"\
                    :\"f7d60a90-6154-4471-8789-b0c8df7e3c1a\",\"friendEmail\":\"friend@test.com\"\
                    ,\"friendAlias\":\"베프\"}]}"
  /api/user/terms:
    get:
      tags:
      - 약관
      summary: 약관 목록 조회
      description: 등록된 약관 종류(Definition) 목록을 페이징하여 반환합니다.
      operationId: terms-list
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                terms-list:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"content\":[{\"\
                    termDefinitionId\":4,\"title\":\"서비스 이용약관\",\"termsTypes\":\"\
                    SERVICE\",\"isRequired\":true},{\"termDefinitionId\":5,\"title\"\
                    :\"개인정보 처리방침\",\"termsTypes\":\"PRIVACY\",\"isRequired\":true}],\"\
                    empty\":false,\"first\":true,\"last\":true,\"number\":0,\"numberOfElements\"\
                    :2,\"pageable\":{\"offset\":0,\"pageNumber\":0,\"pageSize\":10,\"\
                    paged\":true,\"sort\":{\"empty\":true,\"sorted\":false,\"unsorted\"\
                    :true},\"unpaged\":false},\"size\":10,\"sort\":{\"empty\":true,\"\
                    sorted\":false,\"unsorted\":true},\"totalElements\":2,\"totalPages\"\
                    :1}}"
  /api/admin/friends/requests:
    delete:
      tags:
      - 관리자 - 친구
      summary: 친구 요청 강제 삭제
      description: requester → receiver 방향의 친구 요청을 강제 삭제합니다. CS 대응 목적으로 사용합니다.
      operationId: admin-friend-clear-request
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              admin-friend-clear-request:
                value: requester=req%40kakao.com&receiver=rcv%40kakao.com&_csrf=6GTJIk_PBcVxIAr5PKlH2W0Wx1_plyFVASY2DKOUOqG4l7RAjFfxEn-uY6ZcEW_NWYRz7g8i6meN9RV4ZBJUaZukA5fa8dB4
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                admin-friend-clear-request:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/admin/rabbitmq/dlq:
    get:
      tags:
      - 관리자 - DLQ
      summary: 전체 DLQ 목록 조회
      description: 모든 Dead Letter Queue의 이름과 메시지 수를 반환합니다.
      operationId: admin-dlq-list
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                admin-dlq-list:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":[{\"queueName\"\
                    :\"noti.queue.friend.dlq\",\"messageCount\":3,\"consumerCount\"\
                    :0},{\"queueName\":\"noti.queue.service.dlq\",\"messageCount\"\
                    :1,\"consumerCount\":0}]}"
  /api/admin/terms/definition:
    post:
      tags:
      - 관리자 - 약관
      summary: 약관 종류(Definition) 생성
      description: 새로운 약관 종류를 등록합니다. required=true이면 필수 동의 약관입니다.
      operationId: admin-terms-create-definition
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              admin-terms-create-definition:
                value: "{\"termsName\":\"위치 정보 이용 약관\",\"termsType\":\"LOCATION\"\
                  ,\"required\":true}"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                admin-terms-create-definition:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/admin/terms/version:
    post:
      tags:
      - 관리자 - 약관
      summary: 약관 버전 등록
      description: |-
        새로운 약관 버전을 등록합니다.
        기존 활성화된 버전은 자동으로 비활성화(isActive=false)되며, 새 버전이 활성 버전이 됩니다.
      operationId: admin-terms-create-version
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              admin-terms-create-version:
                value: "{\"termDefinitionId\":2,\"version\":\"v1.0\",\"content\":\"\
                  테스트 내용\",\"effectiveDate\":\"2026-05-09T00:13:14.0679263\"}"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                admin-terms-create-version:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":null}"
  /api/notification/fcm/arrival:
    post:
      tags:
      - 알림 - 도착
      summary: 도착 알림 FCM 발송
      description: 목적지 도착 알림을 FCM을 통해 특정 상대방에게 전달합니다.
      operationId: arrival-notification/
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              arrival-notification/blank-body:
                value: "{\"receiverEmail\":\"receiver@example.com\",\"type\":\"ANY_TYPE\"\
                  ,\"body\":\"\"}"
              arrival-notification/invalid-email:
                value: "{\"receiverEmail\":\"not-an-email\",\"type\":\"ANY_TYPE\"\
                  ,\"body\":\"도착했습니다.\"}"
              arrival-notification/success:
                value: "{\"receiverEmail\":\"receiver@example.com\",\"type\":\"ANY_TYPE\"\
                  ,\"body\":\"목적지에 도착했습니다.\"}"
          application/json:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              arrival-notification/without-auth-request:
                value: "{\"receiverEmail\":\"receiver@example.com\",\"type\":\"ANY_TYPE\"\
                  ,\"body\":\"도착했습니다.\"}"
      responses:
        "400":
          description: "400"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                arrival-notification/blank-body:
                  value: "{\"code\":400,\"message\":\"BAD_REQUEST\",\"data\":{\"code\"\
                    :\"INVALID_INPUT_VALUE\",\"message\":\"요청 값에 오류가 있습니다\"}}"
                arrival-notification/invalid-email:
                  value: "{\"code\":400,\"message\":\"BAD_REQUEST\",\"data\":{\"code\"\
                    :\"INVALID_INPUT_VALUE\",\"message\":\"요청 값에 오류가 있습니다\"}}"
        "200":
          description: "200"
        "401":
          description: "401"
  /api/notification/fcm/delivery-result:
    post:
      tags:
      - 알림 - 정상 발송
      summary: 알림 정상 발송 전송 api
      description: 목적지 도착 알림을 정상적으로 발송한 경우 스스로에게 FCM을 통해 해당 내용을 전달
      operationId: delivery-result/
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              delivery-result/empty-body:
                value: "{\"receiverEmail\":\"receiver@example.com\",\"type\":\"ANY_TYPE\"\
                  ,\"body\":\"\"}"
              delivery-result/success:
                value: "{\"receiverEmail\":\"any-receiver@example.com\",\"type\":\"\
                  DELIVERY_RESULT_NOTICE\",\"body\":\"요청하신 알림이 성공적으로 전송되었습니다.\"}"
          application/json:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              delivery-result/without-auth:
                value: "{\"receiverEmail\":\"any@example.com\",\"type\":\"ANY_TYPE\"\
                  ,\"body\":\"test\"}"
      responses:
        "400":
          description: "400"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                delivery-result/empty-body:
                  value: "{\"code\":400,\"message\":\"BAD_REQUEST\",\"data\":{\"code\"\
                    :\"INVALID_INPUT_VALUE\",\"message\":\"요청 값에 오류가 있습니다\"}}"
        "200":
          description: "200"
        "401":
          description: "401"
  /api/notification/fcm/location:
    post:
      tags:
      - 알림 - 위치 수신 대상자 알림
      summary: 위치 수신 대상자 선정 알람 api
      description: 앱을 사용하는 사람에게 알람 발송 설정 시 알람 발송
      operationId: target-notification/success
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              target-notification/success:
                value: "{\"receiverEmail\":\"receiver@example.com\",\"type\":\"ANY_TYPE\"\
                  ,\"body\":\"위치 알림 대상자로 등록되었습니다.\"}"
      responses:
        "200":
          description: "200"
  /api/notification/fcm/send:
    post:
      tags:
      - 알림 - FCM 발송
      summary: 알림 FCM 발송 api
      description: 목적지 도착 알림 FCM으로 발송
      operationId: fcm-notification/
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              fcm-notification/empty-body:
                value: "{\"receiverEmail\":\"receiver@example.com\",\"type\":\"FRIEND_REQUEST\"\
                  ,\"body\":\"\"}"
              fcm-notification/empty-email:
                value: "{\"receiverEmail\":\"\",\"type\":\"FRIEND_REQUEST\",\"body\"\
                  :\"test\"}"
              fcm-notification/invalid-email:
                value: "{\"receiverEmail\":\"not-an-email\",\"type\":\"FRIEND_REQUEST\"\
                  ,\"body\":\"test\"}"
              fcm-notification/success:
                value: "{\"receiverEmail\":\"receiver@example.com\",\"type\":\"FRIEND_REQUEST\"\
                  ,\"body\":\"친구 요청이 왔습니다.\"}"
          application/json:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              fcm-notification/without-auth:
                value: "{\"receiverEmail\":\"receiver@example.com\",\"type\":\"FRIEND_REQUEST\"\
                  ,\"body\":\"test\"}"
      responses:
        "400":
          description: "400"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                fcm-notification/empty-body:
                  value: "{\"code\":400,\"message\":\"BAD_REQUEST\",\"data\":{\"code\"\
                    :\"INVALID_INPUT_VALUE\",\"message\":\"요청 값에 오류가 있습니다\"}}"
                fcm-notification/empty-email:
                  value: "{\"code\":400,\"message\":\"BAD_REQUEST\",\"data\":{\"code\"\
                    :\"INVALID_INPUT_VALUE\",\"message\":\"요청 값에 오류가 있습니다\"}}"
                fcm-notification/invalid-email:
                  value: "{\"code\":400,\"message\":\"BAD_REQUEST\",\"data\":{\"code\"\
                    :\"INVALID_INPUT_VALUE\",\"message\":\"요청 값에 오류가 있습니다\"}}"
        "200":
          description: "200"
        "401":
          description: "401"
  /api/notification/sms/send:
    post:
      tags:
      - 알림 - 문자 알림
      summary: 문자를 통한 알람 발송용 api
      description: 앱을 사용하지 않는 사람에게 SMS로 알람 발송
      operationId: single-sms/success
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              single-sms/success:
                value: "{\"receiverNumber\":\"01012345678\",\"location\":\"판교역\"}"
      responses:
        "200":
          description: "200"
  /api/user/auth/login:
    post:
      tags:
      - 인증
      summary: 카카오 OAuth 로그인 / 기존 유저
      description: 기존 ACTIVE 유저 로그인. 200 OK와 함께 accessToken/refreshToken이 재발급됩니다.
      operationId: auth-login-
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              auth-login-existing:
                value: "{\"provider\":\"KAKAO\",\"idToken\":\"eyJ0eXAiOiJKV1QiLCJraWQiOiJ0ZXN0LWtpZCIsImFsZyI6IlJTMjU2In0..XQz2L2iwvnMAQpFeWT64uCJfWLA2OxRz2jUAxYyNr2WsbCT-beiM2ZsJl5z3FNc-KQLTGg_qjhnb8FrGK_3a0pai1e_qJ7ZYRmAVQN5ue3Plr_l5JXpauT9EzCXkC0LvMYmgmtXs15zjJvmMFQdeGMgLfW7N9EXB749_NaRBimxupFnoiHoFAjdzQ09ZSVQJ-koccsomgrbwR0tIDktNQQYvA8teMl9jm-RcamN8PhY2d2IQmbILvB4LK9Qj46UIg64jgEYdj8pUj-dnc4toV43RcPg2W4SSpT_Ij649ix94lulvXe-SGmk6lc1-_jgpfTg50J0HR7Wo6vYCSR1Hvw\"\
                  }"
              auth-login-new:
                value: "{\"provider\":\"KAKAO\",\"idToken\":\"eyJ0eXAiOiJKV1QiLCJraWQiOiJ0ZXN0LWtpZCIsImFsZyI6IlJTMjU2In0..H3kOmn7SfvA2M9_xbeVhJnPjF12HwNHB9ls9eN_45-m6w1vaVVWjRse5_3r21rQexeKMMX6hg9CiDuDv-o86cxqIyc57FPz6GQYk4xRJithRb5sfi1oX_EQQk1imRJE7_CjiYGL3uiQ_L1AxfT0Utr590Jb4pghxFqzm7CUIyPvGohXGOgtTfm7JNkmDJkdC0TfW6RTNaJJome7EFk9ZBnm8OpvPoowORMLK5w6VJ3of7YXZOUvGoXprCXv8Xq54HuQ8MVwgnLWR_YMxRyj-uHsJtYr5OP8pk34Ntm_ZS8fL3W54GWueAYzotZpzCFBooJLcN6TEikbiCnOq8QYp5A\"\
                  }"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                auth-login-existing:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..XW77CfH1lFaGuWZYITF9UUPW4gH-qY4LG6BcCDseqkGccayEuiGYCAt2USCO0Rt2\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..gES4j-_fz7018aufm-yp4j8WJZ92cv2kp9m-EAtlh4lPHwhdksAEnyY1UKfD_yQu\"\
                    }}"
        "201":
          description: "201"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                auth-login-new:
                  value: "{\"code\":201,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..UZm-NuZPIjS2h9xfTwHCNf6BItwn82Jw72VJ29mdRno2ULgKV7Siu8KGaH0F-vwZ\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..z_XFoDeIDfKE46-zpntMRpXfL-XtuACUq2drwn3aENwkCBLfAlnm-RN_9atrej56\"\
                    }}"
  /api/user/auth/reissue:
    post:
      tags:
      - 인증
      summary: JWT 토큰 재발급
      description: 유효한 refreshToken으로 accessToken/refreshToken을 재발급합니다.
      operationId: auth-reissue
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              auth-reissue:
                value: "{\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..VGBzXO_pEyhpTXG-O0zm8hwSz2eQebtiBvDXN3o0F5z--RO40atbPeZRvkb3k1-q\"\
                  }"
      responses:
        "200":
          description: "200"
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
              examples:
                auth-reissue:
                  value: "{\"code\":200,\"message\":\"OK\",\"data\":{\"accessToken\"\
                    :\"eyJhbGciOiJIUzM4NCJ9..NWRNjAkItmm4yCR1E06wH7B5qelif06OkFjWlMXYIu1u32rhK8wXe_yxtxLXoqP2\"\
                    ,\"refreshToken\":\"eyJhbGciOiJIUzM4NCJ9..hPNVa3itYStb7YK97dA4yjxDl264xRwxjRPVW3C25x3hYxQZnvd_KJf1Qlywvl-J\"\
                    }}"
  /api/user/friends/alias:
    post:
      tags:
      - 친구
      summary: 친구 별명 변경
      description: 요청자의 지정 `friendRelationshipId`에 대한 친구 별명(`friendAlias`)을 업데이트합니다.
      operationId: friends-alias-update
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-admin-rabbitmq-dlq-noti.queue.friend.dlq-33084672"
            examples:
              friends-alias-update:
