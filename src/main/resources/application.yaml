spring:
  application:
    name: imhere
  profiles:
    include: secret, monitoring
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        naming:
          physical-strategy: org.hibernate.boot.model.naming.CamelToUnderscoresNamingStrategy

logging:
  structured:
    format:
      console: ecs
      file: ecs
  file:
    name: logs/imhere.log
  logback:
    rollingpolicy:
      file-name-pattern: "${LOG_FILE}.%d{yyyy-MM-dd}.%i.gz"
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 3GB
  level:
    root: INFO
    com.kdongsu5509: INFO
    # silence noisy frameworks
    org.springframework: WARN
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
    io.lettuce: WARN
    com.google.firebase: WARN
    p6spy: WARN               # SQL logging — enable in dev profile if needed
