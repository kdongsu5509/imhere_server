spring:
  application:
    name: imhere

logging:
  structured:
    format:
      console: ecs
      file: ecs
  file:
    name: logs/imhere.log
  logback:
    rollingpolicy:
      file-name-pattern: "${LOG_FILE}.%d{yyyy-MM-dd}.%i.gz"
      max-file-size: 100MB
      max-history: 30          # keep 30 daily files
      total-size-cap: 3GB
  # ── Level overrides ───────────────────────────────────────────────────────
  level:
    root: INFO
    com.kdongsu5509: INFO
    # silence noisy frameworks
    org.springframework: WARN
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
    io.lettuce: WARN
    com.google.firebase: WARN
    p6spy: WARN               # SQL logging — enable in dev profile if needed
  profiles:
    include: secret, monitoring
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: iamhereqwfavsd
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        naming:
          physical-strategy: org.hibernate.boot.model.naming.CamelToUnderscoresNamingStrategy
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
        shutdown-timeout: 100ms
  rabbitmq:
    host: ${SPRING_RABBIT_MQ_HOST:localhost}
    port: ${SPRING_RABBIT_MQ_PORT:5672}
    username: ${SPRING_RABBIT_MQ_USERNAME:guest}
    password: ${SPRING_RABBIT_MQ_PASSWORD:guest}
    virtual-host: /main

