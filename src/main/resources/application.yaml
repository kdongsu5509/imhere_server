server:
  forward-headers-strategy: native

spring:
  application:
    name: imhere
  profiles:
    include: secret, monitoring, datasource
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        naming:
          physical-strategy: org.hibernate.boot.model.naming.CamelToUnderscoresNamingStrategy

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  structured:
    format:
      file: ecs
  file:
    name: logs/imhere.log
  logback:
    rollingpolicy:
      file-name-pattern: "${LOG_FILE}.%d{yyyy-MM-dd}.%i.gz"
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 3GB
  level:
    org.springframework.security: TRACE
    root: INFO
    com.kdongsu5509: INFO
    # silence noisy frameworks
    org.springframework: WARN
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
    io.lettuce: WARN
    com.google.firebase: WARN
    p6spy: WARN               # SQL logging — enable in dev profile if needed

management:
  tracing:
    sampling:
      probability: 0.1
    baggage:
      enabled: true
