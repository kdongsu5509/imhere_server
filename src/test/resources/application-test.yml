spring:
  data:
    redis:
      port: 6379
      host: host.docker.internal
      lettuce:
        pool:
          max-active: 8  # 최대 연결 개수
          max-idle: 4
          min-idle: 0
          max-wait: -1ms
  batch:
    job:
      enabled: false

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb;MODE=PostgreSQL}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.h2.Driver
  rabbitmq:
    host: ${SPRING_RABBIT_MQ_HOST:host.docker.internal}
    port: ${SPRING_RABBIT_MQ_PORT:5672}
    username: ${SPRING_RABBIT_MQ_USERNAME:guest}
    password: ${SPRING_RABBIT_MQ_PASSWORD:guest}
    virtual-host: /main

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: testSecretKeyForJwtAuthenticationTesting12345678901234567890
  access-expiration-minutes: 30
  refresh-expiration-days: 7
  access-header-name: Authorization

security:
  whitelist:
    - "/api/user/auth/login"
    - "/swagger-ui/**"
    - "/v3/api-docs/**"

oidc:
  kakao:
    issuer: "https://kauth.kakao.com"
    audience: "bf284f33bfeba9bc59575706d0eb0e9c"
    cacheKey: "kakaoOidcKeys::kakaoPublicKeySet"

logging:
  file:
    name: ""           # no file output during tests
  level:
    root: WARN
    com.kdongsu5509: INFO

admin:
  id: test-admin
  nickname: test-nickname
  secret: password

solapi:
  sender: "01012341234"
  apiKey: "test-key"
  apiSecret: "test-secret"

firebase:
  path: "src/test/resources/dummy-firebase-key.json"
