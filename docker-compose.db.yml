version: '3.8'

# Server 3: PostgreSQL
# 포트는 Server 1 (App)에서만 접근 가능하도록 보안 그룹 설정 필요

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-container
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  db-network:
